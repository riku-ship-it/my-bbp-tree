<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶旅程地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE8;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1A1916;
    --text-2: #5C5B57;
    --text-3: #9C9A94;
    --accent: #2A2927;
    --blue: #2563EB;
    --blue-bg: #EFF6FF;
    --blue-border: #BFDBFE;
    --blue-text: #1D4ED8;
    --red: #DC2626;
    --red-bg: #FEF2F2;
    --red-border: #FECACA;
    --red-text: #B91C1C;
    --amber: #D97706;
    --amber-bg: #FFFBEB;
    --amber-border: #FDE68A;
    --amber-text: #92400E;
    --green: #059669;
    --green-bg: #ECFDF5;
    --transition: 0.18s cubic-bezier(.4,0,.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 32px 80px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 24px;
  }
  .header-left { flex: 1; }
  .title-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .title-badge {
    font-size: 10px; font-weight: 500; letter-spacing: .08em;
    background: var(--accent); color: #fff;
    padding: 3px 8px; border-radius: 4px; text-transform: uppercase;
  }
  h1 {
    font-size: 26px; font-weight: 700; color: var(--text);
    outline: none; border-bottom: 1.5px solid transparent;
    transition: border-color var(--transition);
    padding-bottom: 2px; border-radius: 2px;
    cursor: text;
  }
  h1:focus { border-bottom-color: var(--accent); }
  .subtitle {
    font-size: 13px; color: var(--text-3); margin-top: 6px;
    outline: none; border-bottom: 1px solid transparent;
    transition: border-color var(--transition); cursor: text;
  }
  .subtitle:focus { border-bottom-color: var(--border-strong); }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 4px; }
  .btn {
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--text-2); transition: all var(--transition);
  }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .btn.primary:hover { opacity: .88; }

  /* ── Emotion curve ── */
  .emotion-section { margin-bottom: 24px; }
  .section-label {
    font-size: 10px; font-weight: 500; letter-spacing: .08em;
    color: var(--text-3); text-transform: uppercase; margin-bottom: 10px;
  }
  .emotion-chart { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px 8px; }
  .emotion-svg-wrap { width: 100%; height: 56px; position: relative; }
  .emotion-svg { width: 100%; height: 100%; overflow: visible; }
  .stage-names { display: flex; margin-top: 4px; }
  .stage-name-cell {
    flex: 1; text-align: center; font-size: 10px;
    color: var(--text-3); padding: 4px 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Journey stages ── */
  .stages-section { margin-bottom: 24px; }
  .stages-row { display: flex; gap: 10px; align-items: flex-start; }

  .stage-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color var(--transition), box-shadow var(--transition);
    min-width: 0;
  }
  .stage-card:hover { border-color: var(--border-strong); }
  .stage-card.active {
    border-color: var(--border-strong);
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }

  .stage-header {
    padding: 14px 14px 12px;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  .stage-color-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .stage-top { display: flex; align-items: center; gap: 8px; padding-top: 4px; }
  .stage-num {
    font-size: 10px; font-weight: 700; color: var(--text-3);
    letter-spacing: .04em; width: 16px; flex-shrink: 0;
  }
  .stage-title-input {
    flex: 1; font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--text); background: none; border: none; outline: none;
    cursor: pointer; min-width: 0; width: 100%;
  }
  .stage-title-input:focus { cursor: text; }
  .stage-chevron {
    font-size: 10px; color: var(--text-3);
    transition: transform var(--transition); flex-shrink: 0;
  }
  .stage-card.active .stage-chevron { transform: rotate(180deg); }
  .stage-summary {
    font-size: 11px; color: var(--text-3);
    padding: 0 14px 12px; line-height: 1.5;
    outline: none; cursor: text;
  }
  .stage-summary:focus { color: var(--text-2); }
  .stage-summary[placeholder]:empty::before {
    content: attr(placeholder); color: var(--text-3); opacity: .5;
  }

  /* Detail panel */
  .stage-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height .28s cubic-bezier(.4,0,.2,1);
    border-top: 0px solid var(--border);
  }
  .stage-card.active .stage-detail {
    max-height: 600px;
    border-top-width: 1px;
  }
  .detail-inner { padding: 14px; }

  .detail-group { margin-bottom: 14px; }
  .detail-group:last-child { margin-bottom: 0; }
  .detail-group-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .detail-group-label {
    font-size: 10px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase;
  }
  .label-touch { color: var(--blue-text); }
  .label-pain  { color: var(--red-text); }
  .label-owner { color: var(--amber-text); }

  .add-chip-btn {
    font-family: inherit; font-size: 10px; color: var(--text-3);
    background: none; border: 1px dashed var(--border-strong);
    border-radius: 20px; padding: 2px 8px; cursor: pointer;
    transition: all var(--transition);
  }
  .add-chip-btn:hover { color: var(--text); border-color: var(--text-3); background: var(--surface2); }

  .chips-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    line-height: 1.5;
  }
  .chip-touch { background: var(--blue-bg); border: 1px solid var(--blue-border); color: var(--blue-text); }
  .chip-pain  { background: var(--red-bg);  border: 1px solid var(--red-border);  color: var(--red-text); }
  .chip-owner { background: var(--amber-bg);border: 1px solid var(--amber-border);color: var(--amber-text); }

  .chip-text {
    outline: none; min-width: 20px; max-width: 120px;
    white-space: nowrap; cursor: text;
  }
  .chip-del {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(0,0,0,.1); border: none; cursor: pointer;
    font-size: 9px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0; transition: opacity var(--transition);
    line-height: 1;
  }
  .chip:hover .chip-del { opacity: 1; }

  /* ── Add stage button ── */
  .add-stage-wrap { display: flex; align-items: flex-start; padding-top: 14px; }
  .add-stage-btn {
    width: 38px; height: 38px; border-radius: 50%; background: var(--surface);
    border: 1px dashed var(--border-strong); cursor: pointer;
    font-size: 18px; color: var(--text-3);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition); flex-shrink: 0;
  }
  .add-stage-btn:hover { border-color: var(--text-3); color: var(--text); background: var(--surface2); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: 10px; opacity: 0;
    transition: all .25s ease; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="title-wrap">
      <span class="title-badge">Customer Journey</span>
    </div>
    <h1 contenteditable="true" spellcheck="false">客戶旅程地圖</h1>
    <div class="subtitle" contenteditable="true" spellcheck="false">點擊任何欄位可以直接編輯 · 點擊階段卡片展開細節</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="exportJSON()">匯出 JSON</button>
    <button class="btn primary" onclick="exportHTML()">儲存 HTML</button>
  </div>
</div>

<!-- Emotion curve -->
<div class="emotion-section">
  <div class="section-label">客戶情緒曲線</div>
  <div class="emotion-chart">
    <div class="emotion-svg-wrap">
      <svg class="emotion-svg" id="emotionSvg" viewBox="0 0 600 56" preserveAspectRatio="none">
        <polyline id="emotionLine" fill="none" stroke="#2A2927" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <g id="emotionDots"></g>
      </svg>
    </div>
    <div class="stage-names" id="stageNames"></div>
  </div>
</div>

<!-- Stages -->
<div class="stages-section">
  <div class="section-label">旅程階段</div>
  <div style="display:flex; gap:10px; align-items:flex-start;">
    <div class="stages-row" id="stagesRow"></div>
    <div class="add-stage-wrap">
      <button class="add-stage-btn" title="新增階段" onclick="addStage()">+</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STAGE_COLORS = ['#6366F1','#2563EB','#0891B2','#059669','#D97706','#DC2626','#9333EA'];

let data = {
  title: '客戶旅程地圖',
  subtitle: '點擊任何欄位可以直接編輯 · 點擊階段卡片展開細節',
  stages: [
    {
      id: 1, title: '認知', color: '#6366F1',
      summary: '客戶首次接觸品牌或產品',
      emotion: 3,
      touch: ['社群廣告', '口碑推薦', '搜尋引擎'],
      pain: ['不知品牌存在', '資訊太雜亂'],
      owner: ['行銷']
    },
    {
      id: 2, title: '考慮評估', color: '#2563EB',
      summary: '主動搜尋並比較不同解決方案',
      emotion: 5,
      touch: ['官網', '比較頁面', '試用申請'],
      pain: ['競品太多難比較', '看不懂功能差異'],
      owner: ['行銷', '產品']
    },
    {
      id: 3, title: '購買決策', color: '#0891B2',
      summary: '與業務接觸，評估合約與報價',
      emotion: 7,
      touch: ['Demo 會議', '報價單', '合約'],
      pain: ['流程太長', '決策者難說服'],
      owner: ['業務']
    },
    {
      id: 4, title: '導入使用', color: '#059669',
      summary: '開始使用產品，完成初始設定',
      emotion: 6,
      touch: ['Welcome email', '教學文件', 'CS 會議'],
      pain: ['設定太複雜', '缺乏引導'],
      owner: ['CS', '產品']
    },
    {
      id: 5, title: '留存擴張', color: '#D97706',
      summary: '持續使用並探索進階功能',
      emotion: 8,
      touch: ['定期回顧', '功能更新', 'NPS 調查'],
      pain: ['使用率低落', '功能用不到'],
      owner: ['CS', '業務']
    }
  ]
};

function render() {
  renderStages();
  renderEmotionCurve();
}

function renderStages() {
  const row = document.getElementById('stagesRow');
  row.innerHTML = '';
  data.stages.forEach((s, idx) => {
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.id = `stage-${s.id}`;

    card.innerHTML = `
      <div class="stage-header" onclick="toggleStage(${s.id}, event)">
        <div class="stage-color-bar" style="background:${s.color}"></div>
        <div class="stage-top">
          <span class="stage-num">${String(idx+1).padStart(2,'0')}</span>
          <input class="stage-title-input" value="${escHtml(s.title)}"
            onclick="event.stopPropagation()"
            onchange="updateField(${s.id},'title',this.value)"
            oninput="updateField(${s.id},'title',this.value)">
          <span class="stage-chevron">▼</span>
        </div>
      </div>
      <div class="stage-summary" contenteditable="true" spellcheck="false"
        placeholder="簡短說明此階段..."
        onclick="event.stopPropagation()"
        onblur="updateField(${s.id},'summary',this.innerText.trim())"
      >${escHtml(s.summary)}</div>
      <div class="stage-detail" id="detail-${s.id}">
        <div class="detail-inner">

          <div style="margin-bottom:14px;">
            <div class="detail-group-header">
              <span class="detail-group-label label-touch">情緒分數</span>
            </div>
            <input type="range" min="1" max="10" value="${s.emotion}"
              style="width:100%;accent-color:${s.color}"
              oninput="updateField(${s.id},'emotion',+this.value); renderEmotionCurve()">
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-3);margin-top:2px">
              <span>負面</span><span style="font-weight:600;color:${s.color}">${s.emotion}</span><span>正面</span>
            </div>
          </div>

          ${renderChipGroup(s, 'touch', '觸點', 'touch')}
          ${renderChipGroup(s, 'pain', '痛點', 'pain')}
          ${renderChipGroup(s, 'owner', '負責團隊', 'owner')}

          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;">
            <button class="btn" style="font-size:11px;padding:5px 10px;color:var(--red-text);border-color:var(--red-border)"
              onclick="removeStage(${s.id})">刪除此階段</button>
          </div>
        </div>
      </div>
    `;
    row.appendChild(card);
  });
}

function renderChipGroup(s, key, label, type) {
  const chips = (s[key]||[]).map(txt => `
    <span class="chip chip-${type}">
      <span class="chip-text" contenteditable="true" spellcheck="false"
        onblur="updateChip(${s.id},'${key}',this)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
      >${escHtml(txt)}</span>
      <button class="chip-del" onclick="removeChip(${s.id},'${key}',this)">✕</button>
    </span>
  `).join('');
  return `
    <div class="detail-group">
      <div class="detail-group-header">
        <span class="detail-group-label label-${type}">${label}</span>
        <button class="add-chip-btn" onclick="addChip(${s.id},'${key}','${type}')">+ 新增</button>
      </div>
      <div class="chips-wrap" id="chips-${s.id}-${key}">${chips}</div>
    </div>
  `;
}

function renderEmotionCurve() {
  const n = data.stages.length;
  if (!n) return;
  const W = 600, H = 56, pad = 30;
  const xs = data.stages.map((_, i) => pad + i * (W - 2*pad) / Math.max(n-1,1));
  const ys = data.stages.map(s => H - pad/2 - ((s.emotion-1)/9) * (H - pad));

  const pts = xs.map((x,i) => `${x},${ys[i]}`).join(' ');
  document.getElementById('emotionLine').setAttribute('points', pts);

  const dotsG = document.getElementById('emotionDots');
  dotsG.innerHTML = '';
  data.stages.forEach((s,i) => {
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', xs[i]);
    c.setAttribute('cy', ys[i]);
    c.setAttribute('r', '4');
    c.setAttribute('fill', s.color);
    c.setAttribute('stroke', '#fff');
    c.setAttribute('stroke-width', '1.5');
    dotsG.appendChild(c);
  });

  const namesEl = document.getElementById('stageNames');
  namesEl.innerHTML = data.stages.map(s =>
    `<div class="stage-name-cell">${escHtml(s.title)}</div>`
  ).join('');
}

function toggleStage(id, e) {
  const card = document.getElementById(`stage-${id}`);
  card.classList.toggle('active');
}

function updateField(id, key, val) {
  const s = data.stages.find(x => x.id === id);
  if (s) { s[key] = val; if (key==='title') renderEmotionCurve(); }
}

function updateChip(stageId, key, el) {
  const s = data.stages.find(x => x.id === stageId);
  if (!s) return;
  const chips = el.closest('.chips-wrap').querySelectorAll('.chip-text');
  s[key] = Array.from(chips).map(c => c.innerText.trim()).filter(Boolean);
}

function removeChip(stageId, key, btn) {
  const chip = btn.closest('.chip');
  const wrap = chip.closest('.chips-wrap');
  chip.remove();
  const s = data.stages.find(x => x.id === stageId);
  if (s) s[key] = Array.from(wrap.querySelectorAll('.chip-text')).map(c=>c.innerText.trim()).filter(Boolean);
}

function addChip(stageId, key, type) {
  const s = data.stages.find(x => x.id === stageId);
  if (!s) return;
  const wrap = document.getElementById(`chips-${stageId}-${key}`);
  const newText = '新項目';
  s[key].push(newText);
  const span = document.createElement('span');
  span.className = `chip chip-${type}`;
  span.innerHTML = `
    <span class="chip-text" contenteditable="true" spellcheck="false"
      onblur="updateChip(${stageId},'${key}',this)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
    >${newText}</span>
    <button class="chip-del" onclick="removeChip(${stageId},'${key}',this)">✕</button>
  `;
  wrap.appendChild(span);
  setTimeout(() => {
    const ct = span.querySelector('.chip-text');
    ct.focus();
    const range = document.createRange();
    range.selectNodeContents(ct);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }, 30);
}

function addStage() {
  const id = Date.now();
  const colorIdx = data.stages.length % STAGE_COLORS.length;
  data.stages.push({
    id, title: '新階段', color: STAGE_COLORS[colorIdx],
    summary: '', emotion: 5,
    touch: [], pain: [], owner: []
  });
  render();
  setTimeout(() => {
    const card = document.getElementById(`stage-${id}`);
    if (card) {
      card.classList.add('active');
      card.querySelector('.stage-title-input').focus();
      card.querySelector('.stage-title-input').select();
      card.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
  }, 50);
}

function removeStage(id) {
  if (data.stages.length <= 1) { showToast('至少保留一個階段'); return; }
  data.stages = data.stages.filter(s => s.id !== id);
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportJSON() {
  syncDataFromDOM();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'customer-journey.json'; a.click();
  showToast('JSON 已匯出');
}

function exportHTML() {
  syncDataFromDOM();
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'customer-journey.html'; a.click();
  showToast('HTML 已儲存');
}

function syncDataFromDOM() {
  const h1 = document.querySelector('h1');
  if (h1) data.title = h1.innerText.trim();
  const sub = document.querySelector('.subtitle');
  if (sub) data.subtitle = sub.innerText.trim();
  data.stages.forEach(s => {
    const card = document.getElementById(`stage-${s.id}`);
    if (!card) return;
    const titleInput = card.querySelector('.stage-title-input');
    if (titleInput) s.title = titleInput.value;
    const sumEl = card.querySelector('.stage-summary');
    if (sumEl) s.summary = sumEl.innerText.trim();
    ['touch','pain','owner'].forEach(key => {
      const wrap = document.getElementById(`chips-${s.id}-${key}`);
      if (wrap) s[key] = Array.from(wrap.querySelectorAll('.chip-text')).map(c=>c.innerText.trim()).filter(Boolean);
    });
  });
}

render();
</script>
</body>
</html>
