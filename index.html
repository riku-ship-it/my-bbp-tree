<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP Knowledge Skill Tree</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --blue: #00d4ff;
            --locked: #4a4a4a;
            --bg-dark: #0a0a0c;
        }
        body, html { margin: 0; padding: 0; background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 遊戲背景裝飾 */
        #app { display: flex; height: 100vh; background: radial-gradient(circle, #1a1a2e 0%, #0a0a0c 100%); }

        /* 左側編輯面板 - 可收合 */
        #sidebar {
            width: 320px; background: rgba(20, 20, 25, 0.95);
            border-right: 2px solid #333; padding: 20px;
            transition: transform 0.3s; z-index: 100; overflow-y: auto;
        }
        .sidebar-hidden { transform: translateX(-320px); position: absolute; }

        /* 技能樹主畫布 */
        #canvas { flex-grow: 1; display: flex; justify-content: center; align-items: center; cursor: grab; }
        #canvas:active { cursor: grabbing; }

        /* 節點編輯樣式 */
        .skill-card {
            background: #222; border-left: 4px solid var(--blue);
            margin-bottom: 15px; padding: 10px; border-radius: 4px;
        }
        input, select { width: 100%; background: #111; color: #eee; border: 1px solid #444; padding: 8px; margin: 5px 0; }
        
        button {
            width: 100%; padding: 10px; margin-top: 10px;
            background: linear-gradient(to bottom, #444, #222);
            color: var(--gold); border: 1px solid var(--gold);
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        button:hover { background: var(--gold); color: black; }

        /* 懸浮控制按鈕 */
        .toggle-btn {
            position: fixed; left: 10px; top: 10px; z-index: 101;
            width: 40px; height: 40px; background: var(--gold); border: none; color: black;
        }
    </style>
</head>
<body>

<div id="app">
    <button class="toggle-btn" @click="showSidebar = !showSidebar">☰</button>
    
    <div id="sidebar" :class="{ 'sidebar-hidden': !showSidebar }">
        <h2 style="color: var(--gold); text-align: center; letter-spacing: 2px;">SKILL TREE</h2>
        <hr border="1" color="#333">
        
        <div v-for="(node, index) in skills" :key="node.id" class="skill-card">
            <input v-model="node.label" placeholder="技能名稱 (例如: Python基礎)">
            <select v-model="node.parent">
                <option value="">-- 無前置技能 --</option>
                <option v-for="s in skills" v-show="s.id !== node.id" :value="s.id">{{ s.label }}</option>
            </select>
            <select v-model="node.status">
                <option value="mastered">✨ 已精通 (Gold)</option>
                <option value="active">🔥 修練中 (Blue)</option>
                <option value="locked">🔒 鎖定中 (Gray)</option>
            </select>
            <button @click="removeSkill(index)" style="border-color: #ff4444; color: #ff4444; padding: 2px;">移除</button>
        </div>

        <button @click="addSkill">+ 學習新技能</button>
        <button @click="updateChart" style="background: var(--gold); color: black; margin-top: 20px;">⚡ 更新地圖</button>
        
        <div style="margin-top: 20px; font-size: 12px; color: #666;">
            貼心提醒：修改完後請點擊「更新地圖」。若要存檔，需將 JSON 內容存回 GitHub。
        </div>
    </div>

    <div id="canvas" id="zoom-container">
        <div class="mermaid" id="mermaid-chart">
            {{ chartCode }}
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                showSidebar: true,
                skills: [
                    { id: 'root', label: '我的BBP起源', parent: '', status: 'mastered' },
                    { id: 's1', label: 'GitHub實作', parent: 'root', status: 'active' },
                    { id: 's2', label: '前端開發', parent: 'root', status: 'locked' }
                ],
                chartCode: ''
            }
        },
        methods: {
            addSkill() {
                const id = 's' + Date.now();
                this.skills.push({ id, label: '新技能', parent: 'root', status: 'locked' });
            },
            removeSkill(index) {
                this.skills.splice(index, 1);
            },
            updateChart() {
                let code = "graph TD\n";
                // 遊戲風格配色
                code += "classDef mastered fill:#f1c40f,stroke:#fff,stroke-width:2px,color:#000;\n";
                code += "classDef active fill:#3498db,stroke:#fff,stroke-width:2px,color:#fff;\n";
                code += "classDef locked fill:#2c3e50,stroke:#7f8c8d,color:#95a5a6,stroke-dasharray: 5 5;\n";

                this.skills.forEach(s => {
                    // 使用 HTML 標籤讓節點變圓角矩形
                    const label = `"${s.label}"`;
                    if (s.parent) {
                        code += `  ${s.parent} --> ${s.id}(${label})\n`;
                    } else {
                        code += `  ${s.id}(${label})\n`;
                    }
                    code += `  class ${s.id} ${s.status};\n`;
                });

                const element = document.getElementById('mermaid-chart');
                element.removeAttribute('data-processed');
                element.innerHTML = code;
                mermaid.render('graphDiv', code).then(res => {
                    element.innerHTML = res.svg;
                });
            }
        },
        mounted() {
            mermaid.initialize({ 
                startOnLoad: false, 
                theme: 'dark',
                flowchart: { curve: 'basis', htmlLabels: true }
            });
            this.updateChart();
        }
    }).mount('#app');
</script>

</body>
</html>
