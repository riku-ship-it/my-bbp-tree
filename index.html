<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOP 階段二 — 管理系統研習與導入</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: #E0DAD0;
    --border2: #C8C0B0;
    --text-primary: #1A1612;
    --text-secondary: #6B6258;
    --text-muted: #A09890;
    --accent: #2D4A3E;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  /* Header */
  .page-header {
    background: var(--accent);
    padding: 2.5rem 3rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: -70px; left: 38%;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    pointer-events: none;
  }
  .header-label {
    font-size: 11px;
    letter-spacing: .18em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-bottom: .5rem;
  }
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.25;
    margin-bottom: .35rem;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
  }
  .header-meta {
    margin-top: 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .meta-chip {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }

  /* Toolbar */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .7rem 3rem;
    display: flex;
    align-items: center;
    gap: .6rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .toolbar-label { font-size: 12px; color: var(--text-muted); }
  .tb-btn {
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--surface2); color: var(--text-primary); }
  .tb-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tb-btn.primary:hover { opacity: .85; }
  .tb-sep { width: 1px; height: 20px; background: var(--border); }
  .edit-badge {
    display: none;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    background: #FFF8E0;
    border: 1px solid #E8C840;
    color: #806000;
  }
  body.edit-mode .edit-badge { display: inline-block; }

  /* Main */
  .main { padding: 2rem 3rem 3rem; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem 1.25rem;
    margin-bottom: 1.75rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .legend-label {
    width: 100%;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: .2rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Timeline */
  .timeline-area { overflow-x: auto; padding-bottom: .5rem; }
  .timeline-inner { min-width: 1080px; }

  /* Axis */
  .axis-row {
    display: flex;
    align-items: center;
    margin-bottom: 1.25rem;
    position: relative;
    padding: 0 8px;
  }
  .axis-line {
    position: absolute;
    top: 17px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--border2) 10%, var(--border2) 90%, transparent 100%);
    z-index: 0;
  }
  .axis-node {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .axis-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-bottom: 5px;
    flex-shrink: 0;
    outline: 2px solid var(--bg);
  }
  .axis-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 2px 8px;
    border-radius: 12px;
  }

  /* Modules row */
  .modules-row { display: flex; gap: 8px; align-items: flex-start; }
  .mod-col { flex: 1; min-width: 0; }

  /* Module card */
  .mod-card {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow .2s;
  }
  .mod-card:hover { box-shadow: var(--shadow-md); }

  .mod-header {
    padding: 9px 10px 9px 16px;
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
    position: relative;
  }
  .mod-header:hover { background: var(--surface2); }
  .mod-accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .mod-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 2px 6px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .mod-title {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-primary);
    flex: 1;
    line-height: 1.35;
  }
  .mod-count {
    font-size: 9px;
    color: var(--text-muted);
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 6px;
    flex-shrink: 0;
  }
  .mod-chev {
    font-size: 8px;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: transform .22s ease;
  }
  .mod-chev.open { transform: rotate(180deg); }

  /* Sections wrap (horizontal) */
  .sects-wrap {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    padding: 8px;
  }
  .sects-wrap.open { display: block; }
  .sects-inner {
    display: flex;
    gap: 7px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .sects-inner::-webkit-scrollbar { height: 4px; }
  .sects-inner::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Section card */
  .sect-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    width: 160px;
    flex-shrink: 0;
    transition: box-shadow .15s;
  }
  .sect-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .sect-head {
    padding: 6px 8px;
    display: flex;
    align-items: flex-start;
    gap: 4px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .sect-head:hover { background: var(--surface2); }
  .sect-num {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 1px;
    min-width: 24px;
  }
  .sect-title {
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text-primary);
    flex: 1;
    line-height: 1.4;
  }
  .sect-chev {
    font-size: 7px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform .2s;
  }
  .sect-chev.open { transform: rotate(180deg); }

  .lessons-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height .28s ease;
  }
  .lessons-list.open {
    max-height: 1000px;
    border-top: 1px solid var(--border);
  }
  .lesson-item {
    font-size: 10px;
    color: var(--text-secondary);
    padding: 3px 8px 3px 13px;
    line-height: 1.6;
    border-bottom: 1px solid var(--bg);
    position: relative;
    transition: background .1s, color .1s;
    cursor: default;
  }
  .lesson-item::before {
    content: '';
    position: absolute;
    left: 6px; top: 9px;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .lesson-item:last-child { border-bottom: none; }
  .lesson-item:hover { background: var(--surface2); color: var(--text-primary); }

  /* Edit mode */
  body.edit-mode .editable[contenteditable="true"] {
    border-bottom: 1.5px dashed rgba(45,74,62,.5);
    border-radius: 2px;
    cursor: text;
    background: rgba(45,74,62,.04);
    outline: none;
  }
  body.edit-mode .editable[contenteditable="true"]:focus {
    background: rgba(45,74,62,.09);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @media (max-width: 768px) {
    .page-header, .toolbar, .main { padding-left: 1.25rem; padding-right: 1.25rem; }
    .header-title { font-size: 1.5rem; }
    .timeline-inner { min-width: 720px; }
  }
</style>
</head>

function buildModules() {
  const row = document.getElementById('modulesRow');
  MODULES.forEach(m => {
    const col = document.createElement('div');
    col.className = 'mod-col';

    const sectsHtml = m.sects.map(s => {
      const lsHtml = s.lessons.map(l =>
        `<div class="lesson-item editable">${l}</div>`
      ).join('');
      return `<div class="sect-card">
        <div class="sect-head" onclick="toggleSect(this)">
          <span class="sect-num">${s.num}</span>
          <span class="sect-title editable">${s.title}</span>
          <span class="sect-chev">▾</span>
        </div>
        <div class="lessons-list">${lsHtml}</div>
      </div>`;
    }).join('');

    col.innerHTML = `
      <div class="mod-card">
        <div class="mod-header" onclick="toggleMod(this)">
          <div class="mod-accent-bar" style="background:${m.color}"></div>
          <span class="mod-num" style="background:${m.bg};color:${m.color}">${m.num}</span>
          <span class="mod-title editable">${m.title}</span>
          <span class="mod-count">${m.sects.length}節</span>
          <span class="mod-chev">▾</span>
        </div>
        <div class="sects-wrap">
          <div class="sects-inner">${sectsHtml}</div>
        </div>
      </div>`;
    row.appendChild(col);
  });
}

function toggleMod(header) {
  const wrap = header.nextElementSibling;
  const chev = header.querySelector('.mod-chev');
  const isOpen = wrap.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
}

function toggleSect(head) {
  const list = head.nextElementSibling;
  const chev = head.querySelector('.sect-chev');
  const isOpen = list.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
}

function expandAll() {
  document.querySelectorAll('.sects-wrap').forEach(w => w.classList.add('open'));
  document.querySelectorAll('.mod-chev').forEach(c => c.classList.add('open'));
  document.querySelectorAll('.lessons-list').forEach(l => l.classList.add('open'));
  document.querySelectorAll('.sect-chev').forEach(c => c.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.sects-wrap').forEach(w => w.classList.remove('open'));
  document.querySelectorAll('.mod-chev').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.lessons-list').forEach(l => l.classList.remove('open'));
  document.querySelectorAll('.sect-chev').forEach(c => c.classList.remove('open'));
}
function expandModules() {
  document.querySelectorAll('.sects-wrap').forEach(w => w.classList.add('open'));
  document.querySelectorAll('.mod-chev').forEach(c => c.classList.add('open'));
  document.querySelectorAll('.lessons-list').forEach(l => l.classList.remove('open'));
  document.querySelectorAll('.sect-chev').forEach(c => c.classList.remove('open'));
}

let editMode = false;
function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editBtn');
  btn.textContent = editMode ? '✓ 完成編輯' : '✎ 編輯模式';

  document.querySelectorAll('.editable').forEach(el => {
    el.contentEditable = editMode ? 'true' : 'false';
  });
  document.querySelector('.header-title').contentEditable = editMode ? 'true' : 'false';
}

function saveHTML() {
  const clone = document.documentElement.cloneNode(true);
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  clone.querySelector('body').classList.remove('edit-mode');
  const html = '<!DOCTYPE html>\n' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bop_phase2_timeline.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

buildModules();
