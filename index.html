<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶旅程圖</title>
<style>
/* ================================================================
   全域變數 & Reset
================================================================ */
:root {
  --sidebar-w: 230px;
  --timeline-h: 68px;
  --gap: 16px;
  --radius: 10px;
  --shadow: 0 2px 10px rgba(0,0,0,0.09);
  --border: #e0e0e0;
  --bg: #f4f5f8;
  --white: #ffffff;
  --text-dark: #1a1a2e;
  --text-mid: #555;
  --text-muted: #9e9e9e;
  --accent: #3949ab;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif;
  font-size: 13px;
  color: var(--text-dark);
  background: var(--bg);
  overflow-x: hidden;
}
input, textarea, select {
  font-family: inherit;
  font-size: inherit;
}

/* ================================================================
   Loading Overlay
================================================================ */
#loading {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; z-index: 2000;
  transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 52px; height: 52px;
  border: 5px solid #e3e6ff;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; color: var(--text-mid); font-weight: 500; }

/* ================================================================
   Top Bar  （包含儲存按鈕 + 狀態訊息）
================================================================ */
#topbar {
  position: fixed;
  top: 0; right: 0;
  height: var(--timeline-h);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
  z-index: 300;
}
#save-btn {
  padding: 9px 22px;
  background: #43a047;
  color: #fff;
  border: none; border-radius: 7px;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(67,160,71,0.35);
  transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
  white-space: nowrap;
}
#save-btn:hover { background: #388e3c; box-shadow: 0 4px 10px rgba(67,160,71,0.4); }
#save-btn:active { transform: scale(0.97); }
#save-btn:disabled { background: #9e9e9e; box-shadow: none; cursor: not-allowed; }

#status-msg {
  font-size: 13px; font-weight: 600;
  padding: 7px 14px; border-radius: 6px;
  color: #fff;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
  max-width: 320px;
}
#status-msg.show { opacity: 1; }
#status-msg.success { background: rgba(67,160,71,0.88); }
#status-msg.error   { background: rgba(229,57,53,0.88); }

/* ================================================================
   Horizontal Timeline  （頂部橫向時間軸）
================================================================ */
#timeline {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--timeline-h);
  background: #1a237e;
  display: flex; align-items: center;
  padding: 0 200px 0 calc(var(--sidebar-w) + 16px);
  overflow-x: auto; overflow-y: hidden;
  gap: 4px; z-index: 200;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#timeline::-webkit-scrollbar { height: 4px; }
#timeline::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }

.tl-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer; user-select: none;
  white-space: nowrap;
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  transition: background 0.18s, border-color 0.18s;
  min-width: 110px;
}
.tl-item:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.45); }
.tl-item.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.6); }

.tl-phase   { font-size: 13px; font-weight: 700; line-height: 1.3; }
.tl-product { font-size: 10.5px; opacity: 0.75; margin-top: 2px; }

.tl-arrow {
  color: rgba(255,255,255,0.35);
  font-size: 18px; flex-shrink: 0;
  line-height: 1;
}

/* ================================================================
   Left Sidebar
================================================================ */
#sidebar {
  position: fixed;
  top: var(--timeline-h); left: 0;
  width: var(--sidebar-w);
  height: calc(100vh - var(--timeline-h));
  background: var(--white);
  border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
  z-index: 150;
  padding: 14px 0 24px;
  scrollbar-width: thin;
}
.sb-title {
  padding: 0 16px 10px;
  font-size: 10px; font-weight: 800;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: 0.8px;
}
.sb-item {
  display: flex; align-items: center;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.15s;
  gap: 10px; border-radius: 0;
  position: relative;
}
.sb-item::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px; background: transparent;
  border-radius: 0 2px 2px 0;
  transition: background 0.15s;
}
.sb-item:hover { background: #f5f6fb; }
.sb-item.active { background: #eef0fb; }
.sb-item.active::before { background: var(--accent); }

.sb-dot {
  width: 11px; height: 11px;
  border-radius: 50%; flex-shrink: 0;
}
.sb-name {
  flex: 1; font-size: 13px; font-weight: 500;
  color: var(--text-dark);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sb-count {
  flex-shrink: 0;
  font-size: 11px; color: var(--text-muted);
  background: #f0f0f0;
  padding: 2px 8px; border-radius: 10px;
  font-weight: 600;
}

/* ================================================================
   Main Content Area
================================================================ */
#main {
  margin-left: var(--sidebar-w);
  margin-top: var(--timeline-h);
  padding: 28px 28px 60px;
  min-height: calc(100vh - var(--timeline-h));
}

/* ================================================================
   Phase Block
================================================================ */
.phase-block {
  margin-bottom: 30px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  background: var(--white);
}

.phase-hdr {
  display: flex; align-items: center; flex-wrap: wrap;
  padding: 14px 20px; gap: 10px;
  color: #fff;
}
.phase-hdr-title {
  font-size: 17px; font-weight: 800;
  letter-spacing: 0.3px;
}
.phase-hdr-product {
  font-size: 12px;
  background: rgba(255,255,255,0.22);
  padding: 3px 11px; border-radius: 12px;
  font-weight: 600;
}
.phase-hdr-count {
  margin-left: auto;
  font-size: 12px; opacity: 0.7;
}

.phase-nodes {
  display: flex; flex-wrap: wrap;
  gap: var(--gap); padding: 18px;
  background: var(--white);
}

/* ================================================================
   Node Card
================================================================ */
.node-card {
  flex: 1 1 360px;
  max-width: calc(50% - var(--gap)/2);
  background: #fcfcfd;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 15px 16px 16px;
  display: flex; flex-direction: column; gap: 11px;
  transition: box-shadow 0.18s;
}
.node-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }

@media (max-width: 860px) {
  .node-card { max-width: 100%; }
}

/* Card Header */
.card-hdr {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 11px;
  border-bottom: 2px solid var(--border);
}
.node-idx {
  width: 30px; height: 30px; flex-shrink: 0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff;
}
.node-idx-input {
  width: 30px; height: 30px; flex-shrink: 0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff;
  text-align: center;
  border: none; outline: none;
  cursor: text;
}
.node-name-input {
  flex: 1;
  font-size: 15px; font-weight: 700;
  color: var(--text-dark);
  border: none; background: transparent;
  outline: none; padding: 2px 4px;
  border-bottom: 2px solid transparent;
  border-radius: 0;
  transition: border-color 0.15s;
  width: 0; /* flex will grow */
}
.node-name-input:focus { border-bottom-color: var(--accent); }

/* Field Group */
.fgroup { display: flex; flex-direction: column; gap: 6px; }
.fgroup-title {
  font-size: 9.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted);
}
.frow { display: flex; gap: 8px; }
.fitem { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.flabel {
  font-size: 10px; color: var(--text-muted);
  font-weight: 600; white-space: nowrap;
}
.finput {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 12px; color: var(--text-dark);
  background: var(--white);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  resize: none;
  line-height: 1.45;
}
.finput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2.5px rgba(57,73,171,0.12);
}
textarea.finput { min-height: 54px; resize: vertical; }

/* Risk field — highlight */
.finput.risk {
  border-color: #ffb300;
  background: #fffde7;
}
.finput.risk:focus {
  border-color: #f57f17;
  box-shadow: 0 0 0 2.5px rgba(245,127,23,0.15);
}

/* Items grid */
.items-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

/* ================================================================
   Empty / Error State
================================================================ */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}
.empty-state h2 { font-size: 22px; margin-bottom: 10px; color: var(--text-mid); }
.empty-state p  { font-size: 14px; line-height: 1.7; }
.empty-state code {
  display: inline-block;
  background: #eff0fb;
  padding: 2px 8px; border-radius: 4px;
  color: var(--accent); font-weight: 700;
}

/* ================================================================
   Add-node button inside phase
================================================================ */
.add-node-wrap {
  padding: 12px 18px 18px;
  background: var(--white);
}
.add-node-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  border: 1.5px dashed #bbb;
  border-radius: 7px;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.add-node-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: #eef0fb;
}

</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">載入旅程資料中…</div>
</div>

<!-- Top-right save bar -->
<div id="topbar">
  <div id="status-msg"></div>
  <button id="save-btn" onclick="handleSave()">💾 儲存</button>
</div>

<!-- Horizontal timeline -->
<div id="timeline"></div>

<!-- Left sidebar -->
<nav id="sidebar">
  <div class="sb-title">階段導覽</div>
  <div id="sb-items"></div>
</nav>

<!-- Main content -->
<main id="main"></main>

<script>
/* ================================================================
   ★ 設定區：請將下方 GAS_URL 替換為您的 Web App URL
      格式範例：https://script.google.com/macros/s/AKfycb.../exec
================================================================ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxh7Pu7QNB7gjMQuykWDZ67olythnuvs9hWch_ikAX1aZC1HO95ljgryhBeF8N02cd7mA/exec';
/* ============================================================== */

// 欄位 key（順序對應 A→R 欄）
const KEYS = [
  'phase','productCode','nodeIndex','nodeName','customerAction',
  'ownerMain','ownerMainRole','handoffOwner','handoffRole','handoffNote',
  'product','item1','item2','item3','item4','item5','risk','notes'
];

// 階段顏色池（依出現順序自動分配）
const COLORS = [
  '#3949AB','#E53935','#00897B','#FB8C00',
  '#8E24AA','#039BE5','#43A047','#6D4C41',
  '#00ACC1','#F4511E','#5E35B1','#D81B60'
];

// ── 狀態 ──────────────────────────────────────────────────────
let phaseOrder  = [];   // 階段出現順序
let colorMap    = {};   // { phaseName: colorHex }
let _nodeSerial = 0;    // 用於卡片唯一 id

// ── 工具函式 ──────────────────────────────────────────────────

const esc = s => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function slugId(phase) {
  return 'phase-blk-' + phase.replace(/\s+/g,'-').replace(/[^\w\u4e00-\u9fff-]/g,'');
}

function assignColor(phase) {
  if (!colorMap[phase]) {
    const idx = Object.keys(colorMap).length;
    colorMap[phase] = COLORS[idx % COLORS.length];
  }
  return colorMap[phase];
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function groupAndSort(nodes) {
  const groups = {};
  const order  = [];
  nodes.forEach(n => {
    const p = n.phase?.trim() || '（未分類）';
    if (!groups[p]) { groups[p] = []; order.push(p); }
    groups[p].push(n);
  });
  order.forEach(p => {
    groups[p].sort((a,b) => (parseFloat(a.nodeIndex)||0) - (parseFloat(b.nodeIndex)||0));
  });
  return { groups, order };
}

// ── Render：Timeline ──────────────────────────────────────────

function renderTimeline(groups, order) {
  const el = document.getElementById('timeline');
  el.innerHTML = '';
  order.forEach((phase, i) => {
    if (i > 0) {
      const arr = document.createElement('span');
      arr.className = 'tl-arrow'; arr.textContent = '›';
      el.appendChild(arr);
    }
    const prods = [...new Set((groups[phase]||[]).map(n=>n.productCode).filter(Boolean))];
    const color = assignColor(phase);
    const item  = document.createElement('div');
    item.className = 'tl-item';
    item.dataset.phase = phase;
    item.style.cssText =
      `border-color:${hexToRgba(color,0.5)};` +
      `background:${hexToRgba(color,0.15)};`;
    item.innerHTML =
      `<div class="tl-phase">${esc(phase)}</div>` +
      (prods.length ? `<div class="tl-product">${esc(prods.join(' / '))}</div>` : '');
    item.onclick = () => scrollToPhase(phase);
    el.appendChild(item);
  });
}

// ── Render：Sidebar ───────────────────────────────────────────

function renderSidebar(groups, order) {
  const el = document.getElementById('sb-items');
  el.innerHTML = '';
  order.forEach(phase => {
    const color = assignColor(phase);
    const item  = document.createElement('div');
    item.className = 'sb-item';
    item.id = 'sb-' + slugId(phase);
    item.dataset.phase = phase;
    item.innerHTML =
      `<div class="sb-dot" style="background:${color};"></div>` +
      `<div class="sb-name">${esc(phase)}</div>` +
      `<div class="sb-count">${(groups[phase]||[]).length}</div>`;
    item.onclick = () => scrollToPhase(phase);
    el.appendChild(item);
  });
}

// ── Render：Main（Phase Blocks + Node Cards）─────────────────

function renderMain(groups, order) {
  const el = document.getElementById('main');
  el.innerHTML = '';

  if (!order.length) {
    el.innerHTML = `
      <div class="empty-state">
        <h2>尚無旅程資料</h2>
        <p>請先確認 <code>GAS_URL</code> 已正確設定，<br>
           或在 Google Sheets 的「旅程資料」工作表中新增資料後重新整理。</p>
      </div>`;
    return;
  }

  order.forEach((phase, pi) => {
    const color = assignColor(phase);
    const nodes = groups[phase] || [];
    const prods = [...new Set(nodes.map(n=>n.productCode).filter(Boolean))];

    const block = document.createElement('section');
    block.className = 'phase-block';
    block.id = slugId(phase);

    // ── Phase Header ─────────────────────────────────────────
    const hdr = document.createElement('div');
    hdr.className = 'phase-hdr';
    hdr.style.background = color;
    hdr.innerHTML =
      `<div class="phase-hdr-title">${esc(phase)}</div>` +
      prods.map(p => `<div class="phase-hdr-product">${esc(p)}</div>`).join('') +
      `<div class="phase-hdr-count">${nodes.length} 個節點</div>`;
    block.appendChild(hdr);

    // ── Node Cards ────────────────────────────────────────────
    const nodesWrap = document.createElement('div');
    nodesWrap.className = 'phase-nodes';
    nodes.forEach(node => nodesWrap.appendChild(buildNodeCard(node, color)));
    block.appendChild(nodesWrap);

    // ── Add Node button ───────────────────────────────────────
    const addWrap = document.createElement('div');
    addWrap.className = 'add-node-wrap';
    const addBtn = document.createElement('button');
    addBtn.className = 'add-node-btn';
    addBtn.innerHTML = `<span>＋</span> 新增節點`;
    addBtn.onclick = () => addNode(phase, nodesWrap, color);
    addWrap.appendChild(addBtn);
    block.appendChild(addWrap);

    el.appendChild(block);
  });
}

// ── Build Node Card ───────────────────────────────────────────

function buildNodeCard(node, color) {
  const id = ++_nodeSerial;
  const card = document.createElement('div');
  card.className = 'node-card';
  card.dataset.cardId = id;

  // 輔助：建立一個 <input> 欄位
  function inp(key, placeholder='') {
    const el = document.createElement('input');
    el.type = 'text';
    el.className = 'finput' + (key==='risk' ? ' risk' : '');
    el.dataset.key = key;
    el.value = node[key] ?? '';
    el.placeholder = placeholder;
    return el;
  }
  // 輔助：建立一個 <textarea> 欄位
  function ta(key, rows=2, placeholder='') {
    const el = document.createElement('textarea');
    el.className = 'finput' + (key==='risk' ? ' risk' : '');
    el.dataset.key = key;
    el.rows = rows;
    el.value = node[key] ?? '';
    el.placeholder = placeholder;
    return el;
  }
  // 輔助：包一個 fitem
  function fitem(label, inputEl) {
    const wrap = document.createElement('div');
    wrap.className = 'fitem';
    const lbl = document.createElement('div');
    lbl.className = 'flabel'; lbl.textContent = label;
    wrap.appendChild(lbl); wrap.appendChild(inputEl);
    return wrap;
  }
  // 輔助：frow（橫向）
  function frow(...items) {
    const row = document.createElement('div');
    row.className = 'frow';
    items.forEach(i => row.appendChild(i));
    return row;
  }
  // 輔助：fgroup
  function fgroup(title, ...children) {
    const g = document.createElement('div');
    g.className = 'fgroup';
    const t = document.createElement('div');
    t.className = 'fgroup-title'; t.textContent = title;
    g.appendChild(t);
    children.forEach(c => g.appendChild(c));
    return g;
  }

  // ── 卡片標頭（節點編號圓圈 + 節點名稱）─────────────────────
  const hdr = document.createElement('div');
  hdr.className = 'card-hdr';

  const idxInput = document.createElement('input');
  idxInput.type = 'text';
  idxInput.className = 'node-idx-input';
  idxInput.dataset.key = 'nodeIndex';
  idxInput.value = node.nodeIndex ?? '';
  idxInput.title = '節點編號';
  idxInput.style.background = color;

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.className = 'node-name-input';
  nameInput.dataset.key = 'nodeName';
  nameInput.value = node.nodeName ?? '';
  nameInput.placeholder = '節點名稱';

  hdr.appendChild(idxInput); hdr.appendChild(nameInput);
  card.appendChild(hdr);

  // ── 階段資訊 ────────────────────────────────────────────────
  card.appendChild(fgroup('階段資訊',
    frow(
      fitem('階段名稱',  inp('phase')),
      fitem('產品代號',  inp('productCode'))
    )
  ));

  // ── 客戶行動 ────────────────────────────────────────────────
  card.appendChild(fgroup('客戶行動',
    fitem('', ta('customerAction', 2, '描述此節點的客戶行動'))
  ));

  // ── 負責方 ──────────────────────────────────────────────────
  card.appendChild(fgroup('負責方',
    frow(
      fitem('本節點負責方', inp('ownerMain')),
      fitem('職稱',         inp('ownerMainRole'))
    ),
    frow(
      fitem('銜接下節點負責方', inp('handoffOwner')),
      fitem('職稱',             inp('handoffRole'))
    ),
    fitem('銜接說明', ta('handoffNote', 2))
  ));

  // ── 產品 / 工具 ─────────────────────────────────────────────
  card.appendChild(fgroup('使用產品 / 工具',
    fitem('', inp('product'))
  ));

  // ── 導入項目清單 ────────────────────────────────────────────
  const itemsGrid = document.createElement('div');
  itemsGrid.className = 'items-grid';
  ['item1','item2','item3','item4','item5'].forEach((k,i) => {
    itemsGrid.appendChild(fitem('項目 '+(i+1), inp(k)));
  });
  card.appendChild(fgroup('導入項目清單', itemsGrid));

  // ── 備註 ────────────────────────────────────────────────────
  card.appendChild(fgroup('備註',
    fitem('風險標示',         inp('risk')),
    fitem('備註 / 注意事項', ta('notes', 2))
  ));

  return card;
}

// ── 新增節點 ──────────────────────────────────────────────────

function addNode(phase, nodesWrap, color) {
  const newNode = {};
  KEYS.forEach(k => newNode[k] = '');
  newNode.phase = phase;

  // 自動產生下一個 nodeIndex
  const existing = [...nodesWrap.querySelectorAll('[data-key="nodeIndex"]')];
  const maxIdx = existing.reduce((m,el) => Math.max(m, parseFloat(el.value)||0), 0);
  newNode.nodeIndex = String(maxIdx + 1);

  const card = buildNodeCard(newNode, color);
  nodesWrap.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // focus 節點名稱
  card.querySelector('[data-key="nodeName"]')?.focus();
}

// ── 收集資料（DOM → JSON）────────────────────────────────────

function collectData() {
  const nodes = [];
  document.querySelectorAll('.node-card').forEach(card => {
    const obj = {};
    card.querySelectorAll('[data-key]').forEach(el => {
      obj[el.dataset.key] = el.value ?? '';
    });
    // 確保所有 KEYS 都存在
    KEYS.forEach(k => { if (!(k in obj)) obj[k] = ''; });
    nodes.push(obj);
  });
  return nodes;
}

// ── 儲存 ──────────────────────────────────────────────────────

async function handleSave() {
  if (GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
    showStatus('請先設定 GAS_URL！', 'error');
    return;
  }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  const data = collectData();

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'save', data })
    });
    const json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message || '儲存失敗');
    showStatus(`✓ 儲存成功（${data.length} 筆）`, 'success');
  } catch (err) {
    showStatus('✗ ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存';
  }
}

// ── 載入 ──────────────────────────────────────────────────────

async function loadData() {
  const loadingEl = document.getElementById('loading');
  const loadingTxt = document.getElementById('loading-text');

  if (GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
    loadingEl.classList.add('hidden');
    setTimeout(() => { loadingEl.style.display='none'; }, 350);
    document.getElementById('main').innerHTML = `
      <div class="empty-state">
        <h2>尚未設定 GAS_URL</h2>
        <p>請開啟此 HTML 檔案，在第一個 <code>&lt;script&gt;</code> 區塊頂部<br>
           將 <code>GAS_URL</code> 的值替換為您的 Google Apps Script Web App URL。</p>
        <p style="margin-top:14px;font-size:12px;color:#bbb;">
          格式：https://script.google.com/macros/s/AKfycb…/exec
        </p>
      </div>`;
    return;
  }

  try {
    loadingTxt.textContent = '載入旅程資料中…';
    const res  = await fetch(GAS_URL + '?action=get', { redirect: 'follow' });
    const json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message || '讀取失敗');

    const { groups, order } = groupAndSort(json.data || []);
    phaseOrder = order;

    renderTimeline(groups, order);
    renderSidebar(groups, order);
    renderMain(groups, order);
    setupScrollSpy(order);

  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div class="empty-state">
        <h2>載入失敗</h2>
        <p>${esc(err.message)}</p>
        <p style="margin-top:10px;font-size:12px;">
          請確認：①&nbsp;GAS_URL 正確 &nbsp;②&nbsp;Web App 已部署為「任何人可存取」
        </p>
      </div>`;
  } finally {
    loadingEl.classList.add('hidden');
    setTimeout(() => { loadingEl.style.display='none'; }, 350);
  }
}

// ── Scroll to Phase ───────────────────────────────────────────

function scrollToPhase(phase) {
  const id   = slugId(phase);
  const el   = document.getElementById(id);
  if (!el) return;
  const offset = parseInt(
    getComputedStyle(document.documentElement).getPropertyValue('--timeline-h')
  ) || 68;
  const top = el.getBoundingClientRect().top + window.scrollY - offset - 12;
  window.scrollTo({ top, behavior: 'smooth' });
}

// ── Scroll Spy（更新 Sidebar active）─────────────────────────

function setupScrollSpy(order) {
  if (!order.length || !('IntersectionObserver' in window)) return;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const phase = entry.target.dataset.phase;

      // Sidebar
      document.querySelectorAll('.sb-item').forEach(el =>
        el.classList.toggle('active', el.dataset.phase === phase)
      );
      // Timeline
      document.querySelectorAll('.tl-item').forEach(el =>
        el.classList.toggle('active', el.dataset.phase === phase)
      );
    });
  }, { rootMargin: `-${parseInt(68)+4}px 0px -55% 0px` });

  order.forEach(phase => {
    const el = document.getElementById(slugId(phase));
    if (el) { el.dataset.phase = phase; observer.observe(el); }
  });
}

// ── Status Message ────────────────────────────────────────────

let _statusTimer = null;
function showStatus(msg, type='success') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_statusTimer);
  _statusTimer = setTimeout(() => { el.className = ''; }, 4500);
}

// ── Init ─────────────────────────────────────────────────────

loadData();
</script>
