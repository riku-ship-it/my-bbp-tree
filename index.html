<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 客服助理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 680px;
      height: 92vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .chat-header .info h2 { font-size: 16px; font-weight: 600; }
    .chat-header .info p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px;
      background: #69f0ae;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 80%;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user   { align-self: flex-end;  flex-direction: row-reverse; }
    .message.bot    { align-self: flex-start; }
    .message.notice { align-self: center; max-width: 90%; }

    .bubble-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .message.bot  .bubble-avatar { background: #e3f2fd; }
    .message.user .bubble-avatar { background: #e8f5e9; }

    .bubble {
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.bot  .bubble { background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .message.user .bubble { background: #1a73e8; color: #fff;    border-bottom-right-radius: 4px; }
    .message.notice .bubble {
      background: #fff3e0; color: #e65100;
      font-size: 13px; border-radius: 10px; text-align: center;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 5px; padding: 12px 16px;
      background: #f1f3f4; border-radius: 18px; border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: #aaa; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid #dadce0;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14.5px;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .input-area textarea:focus { border-color: #1a73e8; }
    .input-area textarea::placeholder { color: #9aa0a6; }
    .input-area textarea:disabled { background: #f5f5f5; }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #1a73e8;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover   { background: #1558b0; }
    .send-btn:active  { transform: scale(0.93); }
    .send-btn:disabled { background: #dadce0; cursor: not-allowed; }
    .send-btn svg { fill: #fff; width: 20px; height: 20px; }

    /* Error banner */
    #error-banner {
      display: none;
      background: #fce8e6; color: #c5221f;
      padding: 10px 20px; font-size: 13px; text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>AI 客服助理</h2>
      <p><span class="status-dot"></span>線上服務中</p>
    </div>
  </div>

  <div id="error-banner"></div>
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="輸入訊息，按 Enter 傳送（Shift+Enter 換行）"
      maxlength="2000"
      disabled
    ></textarea>
    <button class="send-btn" id="send-btn" disabled title="傳送">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // ============================================================
  // ▼▼▼ 在這裡填入你的 Google Apps Script 部署網址 ▼▼▼
  // 部署完成後，從 GAS「部署 > 管理部署作業」複製網址貼到這裡
  // ============================================================
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbwnRuyEVd2lIPn3l7vbKOXJonkaA1_AHAbSU7LMRk8gojfxttex8OjTcxDBQ7-dFss-lw/exec';
  // ============================================================

  // ── State ────────────────────────────────────────────────
  var conversationId = null;
  var isWaiting      = false;

  // ── DOM refs ─────────────────────────────────────────────
  var messagesEl  = document.getElementById('messages');
  var inputEl     = document.getElementById('user-input');
  var sendBtn     = document.getElementById('send-btn');
  var errorBanner = document.getElementById('error-banner');

  // ── 初始化：檢查 GAS_URL 是否已設定，並呼叫 GAS 確認設定 ──
  window.addEventListener('load', function() {
    if (!GAS_URL || GAS_URL.indexOf('YOUR_DEPLOYMENT_ID') !== -1) {
      showErrorBanner('⚠️ 尚未設定 GAS_URL，請在 index.html 頂部填入你的 GAS 部署網址。');
      appendMessage('notice', '⚠️ 請先在 index.html 中填入你的 GAS 部署網址後再使用。');
      return;
    }
    gasRequest({ action: 'check' })
      .then(function(result) {
        if (result.ok) {
          inputEl.disabled = false;
          sendBtn.disabled = false;
          appendMessage('bot', '你好！我是 AI 客服助理，有什麼我可以幫你的嗎？😊');
        } else {
          showErrorBanner(result.message || '設定異常');
          appendMessage('notice', result.message || '設定異常，請確認指令碼屬性。');
        }
      })
      .catch(function(err) {
        showErrorBanner('無法連接到 GAS：' + err.message);
        appendMessage('notice', '⚠️ 無法連接到 GAS，請確認部署網址是否正確。');
      });
  });

  // ── Auto-resize textarea ──────────────────────────────────
  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // ── Keyboard: Enter 傳送，Shift+Enter 換行 ────────────────
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  // ── Handle Send ───────────────────────────────────────────
  function handleSend() {
    var text = inputEl.value.trim();
    if (!text || isWaiting) return;

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    isWaiting = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;

    var typingEl = showTyping();

    var params = { action: 'chat', message: text };
    if (conversationId) params.conversationId = conversationId;

    gasRequest(params)
      .then(function(result) {
        removeTyping(typingEl);
        isWaiting = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();

        if (result.error) {
          appendMessage('notice', '⚠️ ' + result.error);
        } else {
          if (result.conversationId) conversationId = result.conversationId;
          appendMessage('bot', result.reply || '（AI 未回覆）');
        }
      })
      .catch(function(err) {
        removeTyping(typingEl);
        isWaiting = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        appendMessage('notice', '⚠️ 連線失敗：' + err.message);
      });
  }

  // ── 呼叫 GAS API（GET + query params，避免 CORS preflight）──
  function gasRequest(params) {
    var url = GAS_URL + '?' + Object.keys(params)
      .map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
      .join('&');

    return fetch(url)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      });
  }

  // ── Append Message ────────────────────────────────────────
  function appendMessage(role, text) {
    var msgEl = document.createElement('div');
    msgEl.className = 'message ' + role;

    if (role === 'notice') {
      msgEl.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
    } else {
      var emoji = role === 'user' ? '🧑' : '🤖';
      msgEl.innerHTML =
        '<div class="bubble-avatar">' + emoji + '</div>' +
        '<div class="bubble">' + escapeHtml(text) + '</div>';
    }
    messagesEl.appendChild(msgEl);
    scrollToBottom();
  }

  // ── Typing Indicator ──────────────────────────────────────
  function showTyping() {
    var wrapEl = document.createElement('div');
    wrapEl.className = 'message bot';
    wrapEl.innerHTML =
      '<div class="bubble-avatar">🤖</div>' +
      '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(wrapEl);
    scrollToBottom();
    return wrapEl;
  }
  function removeTyping(el) {
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showErrorBanner(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
  }
</script>

</body>
</html>
