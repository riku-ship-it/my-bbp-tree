<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBP Knowledge Tree - Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-elixir/dist/MindElixir.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { height: 100%; width: 100%; background-color: #f8f9fa; }
    
    /* 工具欄樣式 */
    .menu {
      position: fixed; top: 20px; right: 20px;
      display: flex; gap: 10px; z-index: 100;
    }
    .btn {
      background: white; border: 1px solid #d1d5db; padding: 8px 16px;
      border-radius: 6px; cursor: pointer; font-size: 14px; color: #374151;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: all 0.2s;
    }
    .btn:hover { background: #f3f4f6; border-color: #9ca3af; }
    .btn-primary { background: #2563eb; color: white; border: none; }
    .btn-primary:hover { background: #1d4ed8; }

    /* 隱藏不必要的浮動廣告或標誌 */
    .mind-elixir-logo { display: none !important; }
  </style>
</head>
<body>

<div class="menu">
  <button class="btn" onclick="exportData()">💾 複製資料 (手動存檔)</button>
  <button class="btn btn-primary" onclick="window.print()">🖨️ 匯出 PDF</button>
</div>

<div id="map"></div>

<script>
  // 初始數據結構
  let initialData = {
    nodeData: {
      id: 'root',
      topic: '我的知識起源 (BBP)',
      root: true,
      children: [
        {
          id: 'child1',
          topic: '程式開發',
          children: [
            { id: 'gc1', topic: 'Frontend (React)' },
            { id: 'gc2', topic: 'Backend (Node.js)' }
          ]
        },
        {
          id: 'child2',
          topic: '數位行銷',
          children: []
        }
      ]
    }
  };

  // 初始化編輯器
  const mind = new MindElixir({
    el: '#map',
    direction: MindElixir.SIDE, // 向右生長，保持整潔
    data: initialData,
    draggable: true, 
    contextMenu: true, // 右鍵選單
    toolBar: true, 
    nodeMenu: true, 
    keypress: true, // 支援快捷鍵 Tab/Enter
    locale: 'zh_TW'
  });

  mind.init();

  // 匯出資料功能
  function exportData() {
    const data = mind.getAllData();
    const dataString = JSON.stringify(data, null, 2);
    
    // 這裡彈出一個視窗讓用戶複製，未來可以改成自動 Commit 到 GitHub
    const blob = new Blob([dataString], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    
    console.log("當前技能樹數據：", data);
    alert("數據已生成在控制台 (F12)。\n目前的版本建議你手動將這段 JSON 存入你的 GitHub 檔案中。");
  }

  // 快捷鍵提示：
  // Enter -> 新增兄弟節點
  // Tab -> 新增子節點
  // Double Click -> 編輯文字
</script>

</body>
</html>
