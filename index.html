<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBP FlowMap</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --border: #E2DFD8;
  --border-strong: #C4C0B6;
  --text: #1A1916;
  --text-2: #6B6860;
  --text-3: #9B9890;
  --radius: 10px;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* TOPBAR */
.topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; position: sticky; top: 0; z-index: 100; }
.topbar-logo { font-weight: 600; font-size: 15px; color: var(--text); }
.topbar-logo span { color: #6366F1; }
.topbar-sep { width: 1px; height: 20px; background: var(--border); }
.product-tabs { display: flex; gap: 2px; }
.tab-btn { padding: 5px 13px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-2); font-family: 'Noto Sans TC', sans-serif; transition: all .15s; }
.tab-btn:hover { background: var(--bg); color: var(--text); }
.tab-btn.active { background: #1A1916; color: #fff; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn-sm { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border-strong); background: var(--surface); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; color: var(--text); transition: background .12s; }
.btn-sm:hover { background: var(--bg); }
.btn-primary { background: #1A1916; color: #fff; border-color: #1A1916; }
.btn-primary:hover { opacity: .85; background: #1A1916; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: #6366F1; color: #fff; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; }

/* LAYOUT */
.app-body { display: flex; height: calc(100vh - 52px); }

/* SIDEBAR */
.sidebar { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 20px; }
.sb-section { padding: 0 14px; }
.sb-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--text-3); text-transform: uppercase; margin-bottom: 8px; }
.sb-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-2); transition: all .12s; margin-bottom: 1px; }
.sb-item:hover { background: var(--bg); color: var(--text); }
.sb-item.active { background: var(--bg); color: var(--text); }
.sb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-box { background: var(--bg); border-radius: 8px; padding: 10px 12px; margin: 0 14px; }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); margin-bottom: 5px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-chip { width: 22px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.legend-dash { width: 22px; height: 0; border-top: 2px dashed #94A3B8; flex-shrink: 0; }
.legend-solid { width: 22px; height: 0; border-top: 2px solid; flex-shrink: 0; }

/* MAIN CANVAS */
.canvas-area { flex: 1; overflow: auto; padding: 20px; }
.swimlane-wrap { display: inline-block; min-width: 100%; }

/* Phase header */
.phase-row { display: flex; margin-left: 88px; }
.phase-cell { border: 1px solid var(--border); border-right: none; background: var(--surface); display: flex; align-items: center; justify-content: center; height: 36px; font-size: 12px; font-weight: 600; color: var(--text-2); padding: 0 10px; white-space: nowrap; flex-shrink: 0; }
.phase-cell:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 0 0; }
.phase-cell:first-child { border-radius: 8px 0 0 0; }
.phase-cell.variant-positive { background: #F0FDF4; color: #166534; border-color: #BBF7D0; }
.phase-cell.variant-negative { background: #FFF5F5; color: #9A2E14; border-color: #FECACA; }
.phase-cell.variant-warning { background: #FFFBEB; color: #78350F; border-color: #FDE68A; }

/* Lane row */
.lane-row { display: flex; }
.lane-header { width: 88px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; border: 1px solid var(--border); border-top: none; border-right: none; padding: 10px 6px; text-align: center; line-height: 1.3; }
.lane-cell { border: 1px solid; border-top: none; border-right: none; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 12px 14px; position: relative; flex-shrink: 0; }
.lane-cell:last-child { border-right-width: 1px; }
.lane-row:last-child .lane-header { border-bottom-width: 1px; border-bottom-left-radius: 8px; }
.lane-row:last-child .lane-cell:last-child { border-bottom-right-radius: 8px; }
.lane-row:last-child .lane-cell { border-bottom-width: 1px; }

/* NODE */
.node-card { border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform .12s, box-shadow .12s; text-align: center; min-width: 90px; max-width: 160px; line-height: 1.3; border: 1.5px solid transparent; position: relative; }
.node-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.13); }
.node-card.selected { outline: 2px solid #1A1916; outline-offset: 2px; }
.node-sub { font-size: 11px; font-weight: 400; margin-top: 3px; opacity: .85; }
.node-gate { border-radius: 50px !important; min-width: 72px; max-width: 100px; padding: 8px 12px; font-size: 12px; }
.cell-arrow { color: #C4C0B6; font-size: 16px; user-select: none; flex-shrink: 0; }
.cell-empty-hint { font-size: 12px; color: var(--text-3); }

/* RIGHT PANEL */
.right-panel { width: 0; overflow: hidden; background: var(--surface); border-left: 1px solid var(--border); flex-shrink: 0; transition: width .2s; display: flex; flex-direction: column; }
.right-panel.open { width: 250px; overflow-y: auto; }
.rp-inner { width: 250px; padding: 18px 16px; position: relative; }
.rp-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.rp-sub { font-size: 12px; color: var(--text-2); margin-bottom: 18px; }
.field-group { margin-bottom: 13px; }
.field-group label { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: .07em; text-transform: uppercase; display: block; margin-bottom: 5px; }
.field-group input, .field-group select, .field-group textarea { width: 100%; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--border-strong); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); outline: none; }
.field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color: #6366F1; }
.field-group textarea { resize: vertical; min-height: 60px; }
.rp-close { position: absolute; top: 14px; right: 14px; background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 17px; }
.rp-actions { display: flex; gap: 6px; margin-top: 6px; }
.btn-danger { background: #FEF2F2; color: #9A2E14; border: 1px solid #FECACA; border-radius: 7px; padding: 7px 12px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
.btn-danger:hover { background: #FEE2E2; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* BOTTOM AREA */
.bottom-area { background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
.suggestions-row { padding: 10px 20px 0; display: flex; flex-wrap: wrap; gap: 6px; }
.suggestion-chip { display: flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--surface); font-size: 12px; color: var(--text-2); cursor: pointer; transition: all .12s; white-space: nowrap; }
.suggestion-chip:hover { background: var(--bg); color: var(--text); }
.ai-bar { display: flex; gap: 10px; padding: 10px 20px 14px; align-items: flex-end; }
.ai-input-wrap { flex: 1; background: var(--bg); border: 1.5px solid var(--border-strong); border-radius: 12px; padding: 9px 13px; display: flex; align-items: center; gap: 10px; transition: border-color .15s; }
.ai-input-wrap:focus-within { border-color: #6366F1; }
.ai-badge { width: 22px; height: 22px; border-radius: 6px; background: #6366F1; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.ai-textarea { flex: 1; border: none; background: transparent; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: var(--text); outline: none; resize: none; min-height: 22px; max-height: 88px; line-height: 1.5; }
.ai-textarea::placeholder { color: var(--text-3); }
.ai-hint { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; flex-shrink: 0; }
.send-btn { height: 44px; padding: 0 20px; border-radius: 10px; border: none; background: #1A1916; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; white-space: nowrap; transition: opacity .15s; }
.send-btn:hover { opacity: .82; }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }

/* MODAL - Add Phase / Lane */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--surface); border-radius: 14px; padding: 24px; width: 380px; max-width: 95vw; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1A1916; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transition: all .22s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* CHANGELOG */
.changelog { border-top: 1px solid var(--border); max-height: 0; overflow: hidden; transition: max-height .3s; }
.changelog.open { max-height: 160px; overflow-y: auto; }
.changelog-inner { padding: 12px 20px; }
.cl-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
.cl-item { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; align-items: flex-start; }
.cl-item:last-child { border-bottom: none; }
.cl-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); flex-shrink: 0; margin-top: 1px; }
.cl-badge { padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
.badge-edit { background: #EEF0FB; color: #3730A3; }
.badge-add { background: #E6F7F2; color: #065F46; }
.badge-del { background: #FEF2F2; color: #9A2E14; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

/* ═══════════════════════════════════════════
   DEFAULT JSON — everything driven from here
═══════════════════════════════════════════ */
const DEFAULT_DATA = {
  productName: "BBP",
  phases: [
    { id: "p1", label: "① 課程啟動",    width: 210 },
    { id: "p2", label: "② 帳號開通",    width: 190 },
    { id: "p3", label: "③ 試用評估",    width: 220 },
    { id: "p4a", label: "④ 滿意 → 購買", width: 380, variant: "positive" },
    { id: "p4b", label: "④ 不滿意 → 反饋", width: 200, variant: "negative" },
    { id: "p5", label: "⑤ 使用 & 續約", width: 360 }
  ],
  lanes: [
    { id: "client", label: "客戶",   color: "#6366F1", bg: "#EEF0FB", border: "#C5CAF0", textColor: "#3730A3" },
    { id: "d4",     label: "D4 顧問", color: "#059669", bg: "#E6F7F2", border: "#9FD9C5", textColor: "#065F46" },
    { id: "d7",     label: "D7 研發", color: "#E05A38", bg: "#FEF1EE", border: "#F5BBA8", textColor: "#9A2E14" },
    { id: "d2",     label: "D2 業務", color: "#9333EA", bg: "#F6F0FD", border: "#DABFF5", textColor: "#5B1A9A" }
  ],
  nodes: [
    { id: "n1",  phaseId: "p1",  laneId: "client", label: "報名 BOP",       sub: "開始課程",          type: "default" },
    { id: "n2",  phaseId: "p1",  laneId: "client", label: "模組三",         sub: "實作 BBP 組織圖",    type: "default" },
    { id: "n3",  phaseId: "p2",  laneId: "d4",     label: "協助開通帳號",   sub: "引導如何使用",       type: "default" },
    { id: "n4",  phaseId: "p3",  laneId: "client", label: "開始試用 BBP",   sub: "",                  type: "default" },
    { id: "n5",  phaseId: "p3",  laneId: "d4",     label: "追蹤詢問",       sub: "BBP 操作滿意度",     type: "default" },
    { id: "n6",  phaseId: "p3",  laneId: "d4",     label: "滿意？",         sub: "",                  type: "gate"    },
    { id: "n7",  phaseId: "p4a", laneId: "d4",     label: "了解需求",       sub: "帳號數 & 方案 3/6/12月", type: "default" },
    { id: "n8",  phaseId: "p4a", laneId: "d4",     label: "回饋需求",       sub: "給 D7 研發",         type: "default" },
    { id: "n9",  phaseId: "p4a", laneId: "d7",     label: "提供付款連結",   sub: "",                  type: "default" },
    { id: "n10", phaseId: "p4a", laneId: "d7",     label: "確認付款",       sub: "開通職員帳號",       type: "default" },
    { id: "n11", phaseId: "p4a", laneId: "client", label: "確認付款",       sub: "",                  type: "default" },
    { id: "n4b", phaseId: "p4b", laneId: "d4",     label: "反饋提供",       sub: "給 D7 研發",         type: "default" },
    { id: "n4c", phaseId: "p4b", laneId: "d7",     label: "接收反饋",       sub: "待改善",             type: "default" },
    { id: "n12", phaseId: "p5",  laneId: "client", label: "正式使用 BBP",   sub: "職員帳號啟用",       type: "success" },
    { id: "n13", phaseId: "p5",  laneId: "d2",     label: "詢問是否續約",   sub: "購買新方案",         type: "default" },
    { id: "n14", phaseId: "p5",  laneId: "d2",     label: "續約？",         sub: "",                  type: "gate"    },
    { id: "n15", phaseId: "p5",  laneId: "d2",     label: "通知 D7 研發",   sub: "",                  type: "default" },
    { id: "n16", phaseId: "p5",  laneId: "d7",     label: "處理續約",       sub: "提供新付款連結",     type: "default" }
  ]
};

/* ═══════════════════════════════════════════
   COLOR HELPERS
═══════════════════════════════════════════ */
function getLaneStyle(lane) {
  return { backgroundColor: lane.bg + "55", borderColor: lane.border };
}
function getHeaderStyle(lane) {
  return { backgroundColor: lane.bg, borderColor: lane.border, color: lane.textColor };
}
function getNodeStyle(node, lane) {
  if (node.type === "gate") return {
    backgroundColor: "#FEF3C7", color: "#78350F",
    borderColor: "#F59E0B", borderRadius: "50px"
  };
  if (node.type === "success") return {
    backgroundColor: "#059669", color: "#fff", borderColor: "#047857"
  };
  return { backgroundColor: lane.color, color: "#fff", borderColor: lane.color };
}

/* ═══════════════════════════════════════════
   NODE CARD
═══════════════════════════════════════════ */
function NodeCard({ node, lane, selected, onClick }) {
  const style = getNodeStyle(node, lane);
  return (
    <div
      className={`node-card${node.type === "gate" ? " node-gate" : ""}${selected ? " selected" : ""}`}
      style={style}
      onClick={() => onClick(node)}
    >
      {node.label}
      {node.sub && <div className="node-sub">{node.sub}</div>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   LANE CELL — renders all nodes for laneId × phaseId
═══════════════════════════════════════════ */
function LaneCell({ laneId, phaseId, nodes, lanes, phase, selectedId, onSelect, isLast }) {
  const lane = lanes.find(l => l.id === laneId);
  const cellNodes = nodes.filter(n => n.laneId === laneId && n.phaseId === phaseId);
  const style = {
    ...getLaneStyle(lane),
    width: phase.width,
    borderRightWidth: isLast ? "1px" : "0"
  };
  return (
    <div className="lane-cell" style={style}>
      {cellNodes.length === 0 && <span className="cell-empty-hint"></span>}
      {cellNodes.map((node, i) => (
        <React.Fragment key={node.id}>
          {i > 0 && <span className="cell-arrow">→</span>}
          <NodeCard node={node} lane={lane} selected={selectedId === node.id} onClick={onSelect} />
        </React.Fragment>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════
   SWIMLANE TABLE — pure render from data
═══════════════════════════════════════════ */
function SwimlaneTable({ data, selectedId, onSelect }) {
  const { phases, lanes, nodes } = data;
  return (
    <div className="swimlane-wrap">
      {/* Phase header row */}
      <div className="phase-row">
        {phases.map((ph, i) => (
          <div
            key={ph.id}
            className={`phase-cell${ph.variant ? " variant-" + ph.variant : ""}`}
            style={{ width: ph.width }}
          >
            {ph.label}
          </div>
        ))}
      </div>

      {/* Lane rows */}
      {lanes.map((lane, li) => (
        <div className="lane-row" key={lane.id}>
          <div
            className="lane-header"
            style={getHeaderStyle(lane)}
          >
            {lane.label}
          </div>
          {phases.map((ph, pi) => (
            <LaneCell
              key={ph.id}
              laneId={lane.id}
              phaseId={ph.id}
              nodes={nodes}
              lanes={lanes}
              phase={ph}
              selectedId={selectedId}
              onSelect={onSelect}
              isLast={pi === phases.length - 1}
            />
          ))}
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════
   RIGHT PANEL — edit selected node
═══════════════════════════════════════════ */
function RightPanel({ node, data, onSave, onDelete, onClose }) {
  const [form, setForm] = useState({ label: "", sub: "", laneId: "", phaseId: "", type: "default" });
  useEffect(() => {
    if (node) setForm({ label: node.label, sub: node.sub || "", laneId: node.laneId, phaseId: node.phaseId, type: node.type || "default" });
  }, [node]);
  if (!node) return null;
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  return (
    <div className="rp-inner">
      <button className="rp-close" onClick={onClose}>✕</button>
      <div className="rp-title">編輯節點</div>
      <div className="rp-sub">ID: {node.id}</div>
      <div className="field-group">
        <label>節點標題</label>
        <input value={form.label} onChange={e => set("label", e.target.value)} />
      </div>
      <div className="field-group">
        <label>副標題</label>
        <input value={form.sub} onChange={e => set("sub", e.target.value)} placeholder="（選填）" />
      </div>
      <div className="field-group">
        <label>負責角色（泳道）</label>
        <select value={form.laneId} onChange={e => set("laneId", e.target.value)}>
          {data.lanes.map(l => <option key={l.id} value={l.id}>{l.label}</option>)}
        </select>
      </div>
      <div className="field-group">
        <label>所屬階段</label>
        <select value={form.phaseId} onChange={e => set("phaseId", e.target.value)}>
          {data.phases.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
        </select>
      </div>
      <div className="field-group">
        <label>節點類型</label>
        <select value={form.type} onChange={e => set("type", e.target.value)}>
          <option value="default">一般節點</option>
          <option value="gate">判斷點（圓角）</option>
          <option value="success">成功節點（綠色）</option>
        </select>
      </div>
      <div className="rp-actions">
        <button className="btn-danger" onClick={() => onDelete(node.id)}>刪除</button>
        <button className="btn-sm btn-primary" style={{flex:1}} onClick={() => onSave(node.id, form)}>儲存變更</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MODAL — generic dialog
═══════════════════════════════════════════ */
function Modal({ title, sub, children, onClose, onConfirm, confirmLabel = "確認新增" }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">{title}</div>
        <div className="modal-sub">{sub}</div>
        {children}
        <div className="modal-actions">
          <button className="btn-sm" onClick={onClose}>取消</button>
          <button className="btn-sm btn-primary" onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   CHANGELOG
═══════════════════════════════════════════ */
function Changelog({ logs, open }) {
  return (
    <div className={`changelog${open ? " open" : ""}`}>
      <div className="changelog-inner">
        <div className="cl-label">變更記錄</div>
        {logs.length === 0 && <div style={{fontSize:13,color:"var(--text-3)"}}>尚無變更</div>}
        {logs.map((log, i) => (
          <div className="cl-item" key={i}>
            <span className="cl-time">{log.time}</span>
            <span className={`cl-badge badge-${log.type}`}>{log.typeLabel}</span>
            <span dangerouslySetInnerHTML={{__html: log.desc}} />
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   TOAST HOOK
═══════════════════════════════════════════ */
function useToast() {
  const [msg, setMsg] = useState("");
  const [show, setShow] = useState(false);
  const timerRef = useRef(null);
  const toast = useCallback((m) => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setMsg(m); setShow(true);
    timerRef.current = setTimeout(() => setShow(false), 2200);
  }, []);
  return { msg, show, toast };
}

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
function App() {
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem("bbp_data"); return s ? JSON.parse(s) : DEFAULT_DATA; } catch { return DEFAULT_DATA; }
  });
  const [selectedId, setSelectedId] = useState(null);
  const [panelOpen, setPanelOpen] = useState(false);
  const [logOpen, setLogOpen] = useState(false);
  const [logs, setLogs] = useState([]);
  const [aiInput, setAiInput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [modal, setModal] = useState(null); // "phase" | "lane" | "node"
  const [modalForm, setModalForm] = useState({});
  const { msg: toastMsg, show: toastShow, toast } = useToast();
  const textareaRef = useRef(null);

  // Persist
  useEffect(() => {
    try { localStorage.setItem("bbp_data", JSON.stringify(data)); } catch {}
  }, [data]);

  function now() {
    const d = new Date();
    return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
  }

  function addLog(type, typeLabel, desc) {
    setLogs(l => [{ time: now(), type, typeLabel, desc }, ...l]);
  }

  function handleSelectNode(node) {
    setSelectedId(node.id);
    setPanelOpen(true);
  }

  function handleSaveNode(id, form) {
    const old = data.nodes.find(n => n.id === id);
    setData(d => ({ ...d, nodes: d.nodes.map(n => n.id === id ? { ...n, ...form } : n) }));
    addLog("edit", "修改", `節點「<strong>${form.label}</strong>」已更新（角色: ${data.lanes.find(l=>l.id===form.laneId)?.label}）`);
    toast("已儲存並更新 JSON");
    setPanelOpen(false); setSelectedId(null);
  }

  function handleDeleteNode(id) {
    const node = data.nodes.find(n => n.id === id);
    if (!node) return;
    setData(d => ({ ...d, nodes: d.nodes.filter(n => n.id !== id) }));
    addLog("del", "刪除", `已刪除節點「<strong>${node.label}</strong>」`);
    toast(`已刪除「${node.label}」`);
    setPanelOpen(false); setSelectedId(null);
  }

  // ADD PHASE
  function openAddPhase() {
    setModalForm({ label: "", width: 200, variant: "" });
    setModal("phase");
  }
  function confirmAddPhase() {
    if (!modalForm.label) { toast("請輸入階段名稱"); return; }
    const id = "p_" + Date.now();
    setData(d => ({ ...d, phases: [...d.phases, { id, label: modalForm.label, width: parseInt(modalForm.width)||200, variant: modalForm.variant||undefined }] }));
    addLog("add", "新增", `新增階段「<strong>${modalForm.label}</strong>」`);
    toast(`已新增階段「${modalForm.label}」`);
    setModal(null);
  }

  // ADD LANE
  function openAddLane() {
    setModalForm({ label: "", color: "#6366F1", bg: "#EEF0FB", border: "#C5CAF0", textColor: "#3730A3" });
    setModal("lane");
  }
  function confirmAddLane() {
    if (!modalForm.label) { toast("請輸入角色名稱"); return; }
    const id = "lane_" + Date.now();
    setData(d => ({ ...d, lanes: [...d.lanes, { id, label: modalForm.label, color: modalForm.color, bg: modalForm.bg, border: modalForm.border, textColor: modalForm.textColor }] }));
    addLog("add", "新增", `新增角色泳道「<strong>${modalForm.label}</strong>」`);
    toast(`已新增角色「${modalForm.label}」`);
    setModal(null);
  }

  // ADD NODE
  function openAddNode() {
    setModalForm({ label: "", sub: "", laneId: data.lanes[0]?.id || "", phaseId: data.phases[0]?.id || "", type: "default" });
    setModal("node");
  }
  function confirmAddNode() {
    if (!modalForm.label) { toast("請輸入節點名稱"); return; }
    const id = "n_" + Date.now();
    setData(d => ({ ...d, nodes: [...d.nodes, { id, ...modalForm }] }));
    addLog("add", "新增", `新增節點「<strong>${modalForm.label}</strong>」`);
    toast(`已新增節點「${modalForm.label}」`);
    setModal(null);
  }

  // AI COMMAND — parses natural language and modifies data
  async function handleAiSend() {
    const cmd = aiInput.trim();
    if (!cmd || aiLoading) return;
    setAiInput(""); setAiLoading(true);

    // Simulate AI parse (rule-based for demo; replace with Claude API call)
    await new Promise(r => setTimeout(r, 700));

    let handled = false;

    // Pattern: 把「X」的負責人/角色 改成/換成 Y
    const swapRole = cmd.match(/[「"](.+?)[」"]\s*.*?(?:負責人|角色).*?(?:改|換|改成|換成|改為|換為)\s*(.+)/);
    if (swapRole) {
      const nodeLabel = swapRole[1];
      const newLaneLabel = swapRole[2].trim().replace(/[「」]/g, "");
      const targetNode = data.nodes.find(n => n.label === nodeLabel);
      const targetLane = data.lanes.find(l => l.label.includes(newLaneLabel) || newLaneLabel.includes(l.label));
      if (targetNode && targetLane) {
        setData(d => ({ ...d, nodes: d.nodes.map(n => n.id === targetNode.id ? { ...n, laneId: targetLane.id } : n) }));
        addLog("edit", "修改", `將「<strong>${nodeLabel}</strong>」負責人改為 <strong>${targetLane.label}</strong>`);
        toast(`已更新：「${nodeLabel}」→ ${targetLane.label}`);
        handled = true;
      } else {
        toast(targetNode ? `找不到角色「${newLaneLabel}」` : `找不到節點「${nodeLabel}」`);
        handled = true;
      }
    }

    // Pattern: 新增節點「X」到 Y × Z
    if (!handled) {
      const addNode = cmd.match(/新增.*?節點.*?[「"](.+?)[」"]/);
      if (addNode) {
        const label = addNode[1];
        const laneMatch = data.lanes.find(l => cmd.includes(l.label));
        const phaseMatch = data.phases.find(p => cmd.includes(p.label.replace(/[①②③④⑤]/g, "").trim()) || cmd.includes(p.id));
        const id = "n_" + Date.now();
        setData(d => ({ ...d, nodes: [...d.nodes, { id, label, sub: "", laneId: laneMatch?.id || d.lanes[0].id, phaseId: phaseMatch?.id || d.phases[0].id, type: "default" }] }));
        addLog("add", "新增", `新增節點「<strong>${label}</strong>」`);
        toast(`已新增節點「${label}」`);
        handled = true;
      }
    }

    // Pattern: 刪除節點「X」
    if (!handled) {
      const delNode = cmd.match(/刪除.*?[「"](.+?)[」"]/);
      if (delNode) {
        const label = delNode[1];
        const target = data.nodes.find(n => n.label === label);
        if (target) {
          setData(d => ({ ...d, nodes: d.nodes.filter(n => n.id !== target.id) }));
          addLog("del", "刪除", `已刪除節點「<strong>${label}</strong>」`);
          toast(`已刪除「${label}」`);
        } else toast(`找不到節點「${label}」`);
        handled = true;
      }
    }

    // Pattern: 新增階段「X」
    if (!handled) {
      const addPhase = cmd.match(/新增.*?階段.*?[「"](.+?)[」"]/);
      if (addPhase) {
        const label = addPhase[1];
        const id = "p_" + Date.now();
        setData(d => ({ ...d, phases: [...d.phases, { id, label, width: 200 }] }));
        addLog("add", "新增", `新增階段「<strong>${label}</strong>」`);
        toast(`已新增階段「${label}」`);
        handled = true;
      }
    }

    // Pattern: 修改「X」標題/名稱為「Y」
    if (!handled) {
      const rename = cmd.match(/(?:修改|改|更改)[「"](.+?)[」"].*?(?:標題|名稱|改為|為)[「"](.+?)[」"]/);
      if (rename) {
        const oldLabel = rename[1], newLabel = rename[2];
        const target = data.nodes.find(n => n.label === oldLabel);
        if (target) {
          setData(d => ({ ...d, nodes: d.nodes.map(n => n.id === target.id ? { ...n, label: newLabel } : n) }));
          addLog("edit", "修改", `將節點「<strong>${oldLabel}</strong>」改名為「<strong>${newLabel}</strong>」`);
          toast(`已更名：${oldLabel} → ${newLabel}`);
        } else toast(`找不到節點「${oldLabel}」`);
        handled = true;
      }
    }

    if (!handled) {
      toast("無法解析指令，請嘗試：「把『節點名』負責人改成 D4 顧問」");
    }

    setAiLoading(false);
  }

  function fillAi(text) { setAiInput(text); textareaRef.current?.focus(); }

  function exportJson() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${data.productName}_flowmap.json`; a.click();
    URL.revokeObjectURL(url);
    toast("JSON 已匯出");
  }

  function resetData() {
    if (window.confirm("確定要重置回預設資料？")) {
      setData(DEFAULT_DATA); setLogs([]); toast("已重置");
    }
  }

  const selectedNode = data.nodes.find(n => n.id === selectedId);
  const totalLogs = logs.length;

  return (
    <>
      {/* TOPBAR */}
      <div className="topbar">
        <div className="topbar-logo">Flow<span>Map</span></div>
        <div className="topbar-sep" />
        <div className="product-tabs">
          <button className="tab-btn active">{data.productName}</button>
          <button className="tab-btn">+ 新增產品</button>
        </div>
        <div className="topbar-actions">
          <button className="btn-sm" onClick={openAddPhase}>+ 新增階段</button>
          <button className="btn-sm" onClick={openAddLane}>+ 新增角色</button>
          <button className="btn-sm" onClick={openAddNode}>+ 新增節點</button>
          <div className="topbar-sep" />
          <button className="btn-sm" onClick={() => { setLogOpen(v=>!v); }}>
            變更記錄 {totalLogs > 0 && <span style={{background:"#EEF0FB",color:"#3730A3",padding:"1px 6px",borderRadius:4,fontSize:11,marginLeft:4}}>{totalLogs}</span>}
          </button>
          <button className="btn-sm btn-primary" onClick={exportJson}>匯出 JSON</button>
          <div className="avatar">陳</div>
        </div>
      </div>

      {/* APP BODY */}
      <div className="app-body">
        {/* SIDEBAR */}
        <div className="sidebar">
          <div className="sb-section">
            <div className="sb-label">產品週期階段</div>
            {data.phases.map(ph => (
              <div className="sb-item" key={ph.id}>
                <span className="sb-dot" style={{background: ph.variant==="positive"?"#059669":ph.variant==="negative"?"#E05A38":"#6366F1"}} />
                {ph.label}
              </div>
            ))}
          </div>
          <div className="sb-section">
            <div className="sb-label">角色</div>
            {data.lanes.map(lane => (
              <div className="sb-item" key={lane.id}>
                <span className="sb-dot" style={{background: lane.color}} />
                {lane.label}
              </div>
            ))}
          </div>
          <div className="sb-section">
            <div className="sb-label">圖例</div>
            <div className="legend-box">
              {data.lanes.map(lane => (
                <div className="legend-row" key={lane.id}>
                  <div className="legend-chip" style={{background: lane.color}} />
                  {lane.label}
                </div>
              ))}
              <div className="legend-row">
                <div className="legend-chip" style={{background:"#FEF3C7",border:"1px solid #F59E0B",borderRadius:"50px"}} />
                判斷點
              </div>
              <div className="legend-row">
                <div className="legend-dash" />
                跨泳道
              </div>
            </div>
          </div>
          <div className="sb-section" style={{marginTop:"auto"}}>
            <button className="btn-sm" style={{width:"100%",fontSize:12,color:"var(--text-3)"}} onClick={resetData}>重置預設資料</button>
          </div>
        </div>

        {/* CANVAS */}
        <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
          <div className="canvas-area">
            <SwimlaneTable data={data} selectedId={selectedId} onSelect={handleSelectNode} />
          </div>

          {/* BOTTOM: suggestions + AI bar + changelog */}
          <div className="bottom-area">
            <Changelog logs={logs} open={logOpen} />
            <div className="suggestions-row">
              <span style={{fontSize:11,color:"var(--text-3)",fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",alignSelf:"center"}}>快速指令</span>
              <div className="suggestion-chip" onClick={() => fillAi('把「模組三」的負責人改成 D7 研發')}>✏️ 更換負責人</div>
              <div className="suggestion-chip" onClick={() => fillAi('新增節點「客戶教育訓練」到 D4 顧問')}>＋ 新增節點</div>
              <div className="suggestion-chip" onClick={() => fillAi('刪除節點「接收反饋」')}>🗑 刪除節點</div>
              <div className="suggestion-chip" onClick={() => fillAi('新增階段「⑥ 深度整合期」')}>📋 新增階段</div>
              <div className="suggestion-chip" onClick={() => fillAi('修改「正式使用 BBP」名稱為「持續使用 BBP」')}>🏷 改名稱</div>
            </div>
            <div className="ai-bar">
              <div className="ai-input-wrap">
                <div className="ai-badge">AI</div>
                <textarea
                  ref={textareaRef}
                  className="ai-textarea"
                  rows={1}
                  placeholder="白話文輸入修改指令，例如：把「追蹤詢問」的負責人從 D4 顧問換成 D7 研發"
                  value={aiInput}
                  onChange={e => { setAiInput(e.target.value); e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,88)+"px"; }}
                  onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); handleAiSend(); } }}
                />
                <span className="ai-hint">Enter ↵</span>
              </div>
              <button className="send-btn" disabled={aiLoading || !aiInput.trim()} onClick={handleAiSend}>
                {aiLoading ? "解析中…" : "送出修改"}
              </button>
            </div>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className={`right-panel${panelOpen && selectedNode ? " open" : ""}`}>
          {panelOpen && selectedNode && (
            <RightPanel
              node={selectedNode}
              data={data}
              onSave={handleSaveNode}
              onDelete={handleDeleteNode}
              onClose={() => { setPanelOpen(false); setSelectedId(null); }}
            />
          )}
        </div>
      </div>

      {/* MODALS */}
      {modal === "phase" && (
        <Modal title="新增產品階段" sub="新階段將加到橫軸最右側" onClose={() => setModal(null)} onConfirm={confirmAddPhase}>
          <div className="field-group">
            <label>階段名稱</label>
            <input placeholder="例：⑥ 深度整合期" value={modalForm.label||""} onChange={e => setModalForm(f=>({...f,label:e.target.value}))} />
          </div>
          <div className="field-group">
            <label>欄寬（px）</label>
            <input type="number" value={modalForm.width||200} onChange={e => setModalForm(f=>({...f,width:e.target.value}))} />
          </div>
          <div className="field-group">
            <label>樣式（選填）</label>
            <select value={modalForm.variant||""} onChange={e => setModalForm(f=>({...f,variant:e.target.value}))}>
              <option value="">預設</option>
              <option value="positive">正向（綠色）</option>
              <option value="negative">負向（紅色）</option>
              <option value="warning">警告（黃色）</option>
            </select>
          </div>
        </Modal>
      )}
      {modal === "lane" && (
        <Modal title="新增角色泳道" sub="新角色將加到縱軸最下方" onClose={() => setModal(null)} onConfirm={confirmAddLane}>
          <div className="field-group">
            <label>角色名稱</label>
            <input placeholder="例：D1 行銷" value={modalForm.label||""} onChange={e => setModalForm(f=>({...f,label:e.target.value}))} />
          </div>
          <div className="field-group">
            <label>主色（節點顏色）</label>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="color" value={modalForm.color||"#6366F1"} onChange={e => setModalForm(f=>({...f,color:e.target.value}))} style={{width:40,height:36,padding:2,cursor:"pointer"}} />
              <input value={modalForm.color||"#6366F1"} onChange={e => setModalForm(f=>({...f,color:e.target.value}))} style={{flex:1}} />
            </div>
          </div>
          <div className="field-group">
            <label>背景色</label>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="color" value={modalForm.bg||"#EEF0FB"} onChange={e => setModalForm(f=>({...f,bg:e.target.value}))} style={{width:40,height:36,padding:2,cursor:"pointer"}} />
              <input value={modalForm.bg||"#EEF0FB"} onChange={e => setModalForm(f=>({...f,bg:e.target.value}))} style={{flex:1}} />
            </div>
          </div>
        </Modal>
      )}
      {modal === "node" && (
        <Modal title="新增節點" sub="選擇位置後節點會出現在對應格子" onClose={() => setModal(null)} onConfirm={confirmAddNode}>
          <div className="field-group">
            <label>節點標題</label>
            <input placeholder="例：審核文件" value={modalForm.label||""} onChange={e => setModalForm(f=>({...f,label:e.target.value}))} />
          </div>
          <div className="field-group">
            <label>副標題（選填）</label>
            <input placeholder="例：確認資料完整性" value={modalForm.sub||""} onChange={e => setModalForm(f=>({...f,sub:e.target.value}))} />
          </div>
          <div className="field-group">
            <label>負責角色</label>
            <select value={modalForm.laneId} onChange={e => setModalForm(f=>({...f,laneId:e.target.value}))}>
              {data.lanes.map(l => <option key={l.id} value={l.id}>{l.label}</option>)}
            </select>
          </div>
          <div className="field-group">
            <label>所屬階段</label>
            <select value={modalForm.phaseId} onChange={e => setModalForm(f=>({...f,phaseId:e.target.value}))}>
              {data.phases.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
          </div>
          <div className="field-group">
            <label>節點類型</label>
            <select value={modalForm.type||"default"} onChange={e => setModalForm(f=>({...f,type:e.target.value}))}>
              <option value="default">一般節點</option>
              <option value="gate">判斷點（圓角）</option>
              <option value="success">成功節點（綠色）</option>
            </select>
          </div>
        </Modal>
      )}

      {/* TOAST */}
      <div className={`toast${toastShow ? " show" : ""}`}>{toastMsg}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
