<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商旅旅程分析</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── 頂部標題列 ── */
    .top-bar {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .top-bar .avatar {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .top-bar h2 { font-size: 16px; font-weight: 600; }
    .top-bar p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px;
      background: #69f0ae; border-radius: 50%;
      display: inline-block; margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── 主區域：流程圖 ── */
    .main-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f8f9fa;
    }

    /* 流程圖畫布 */
    #flow-canvas {
      width: 100%; height: 100%;
      position: relative;
      overflow: auto;
    }

    /* 空白提示 */
    .empty-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #bbb;
      pointer-events: none;
    }
    .empty-hint .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-hint p { font-size: 15px; }

    /* 流程圖節點容器 */
    #flow-nodes {
      position: relative;
      min-height: 100%;
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* 節點卡片 */
    .flow-node {
      width: 220px;
      background: #fff;
      border: 2px solid #1a73e8;
      border-radius: 12px;
      padding: 14px 18px;
      text-align: center;
      box-shadow: 0 2px 10px rgba(26,115,232,0.12);
      position: relative;
      z-index: 1;
      animation: nodeIn 0.3s ease;
    }
    @keyframes nodeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    .flow-node .node-label {
      font-size: 15px; font-weight: 700;
      color: #1a73e8; margin-bottom: 6px;
    }
    .flow-node .node-desc {
      font-size: 13px; color: #555; line-height: 1.5;
    }

    /* 節點之間的箭頭線 */
    .flow-arrow {
      width: 2px; height: 36px;
      background: #1a73e8;
      position: relative;
      margin: 0 auto;
    }
    .flow-arrow::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #1a73e8;
    }

    /* 節點顏色（依階段） */
    .flow-node[data-stage="0"] { border-color: #e91e63; }
    .flow-node[data-stage="0"] .node-label { color: #e91e63; }
    .flow-node[data-stage="1"] { border-color: #ff9800; }
    .flow-node[data-stage="1"] .node-label { color: #ff9800; }
    .flow-node[data-stage="2"] { border-color: #4caf50; }
    .flow-node[data-stage="2"] .node-label { color: #4caf50; }
    .flow-node[data-stage="3"] { border-color: #9c27b0; }
    .flow-node[data-stage="3"] .node-label { color: #9c27b0; }
    .flow-node[data-stage="4"] { border-color: #1a73e8; }
    .flow-node[data-stage="4"] .node-label { color: #1a73e8; }
    .flow-node[data-stage="5"] { border-color: #009688; }
    .flow-node[data-stage="5"] .node-label { color: #009688; }

    .flow-arrow[data-stage="0"] { background: #e91e63; }
    .flow-arrow[data-stage="0"]::after { border-top-color: #e91e63; }
    .flow-arrow[data-stage="1"] { background: #ff9800; }
    .flow-arrow[data-stage="1"]::after { border-top-color: #ff9800; }
    .flow-arrow[data-stage="2"] { background: #4caf50; }
    .flow-arrow[data-stage="2"]::after { border-top-color: #4caf50; }
    .flow-arrow[data-stage="3"] { background: #9c27b0; }
    .flow-arrow[data-stage="3"]::after { border-top-color: #9c27b0; }
    .flow-arrow[data-stage="4"] { background: #1a73e8; }
    .flow-arrow[data-stage="4"]::after { border-top-color: #1a73e8; }

    /* ── 右下角對話框 ── */
    .chat-widget {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 360px;
      max-height: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 100;
      transition: max-height 0.3s ease;
    }
    .chat-widget.collapsed { max-height: 56px; }

    .widget-header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      flex-shrink: 0;
    }
    .widget-header .left { display: flex; align-items: center; gap: 8px; }
    .widget-header .left span { font-size: 14px; font-weight: 600; }
    .widget-toggle { font-size: 18px; opacity: 0.8; }

    .widget-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .widget-messages::-webkit-scrollbar { width: 4px; }
    .widget-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .w-message { display: flex; align-items: flex-end; gap: 6px; max-width: 90%; }
    .w-message.user   { align-self: flex-end; flex-direction: row-reverse; }
    .w-message.bot    { align-self: flex-start; }
    .w-message.notice { align-self: center; max-width: 100%; }

    .w-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      background: #e3f2fd;
    }
    .w-message.user .w-avatar { background: #e8f5e9; }

    .w-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .w-message.bot    .w-bubble { background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .w-message.user   .w-bubble { background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
    .w-message.notice .w-bubble { background: #fff3e0; color: #e65100; font-size: 12px; border-radius: 8px; text-align: center; }

    .typing-indicator {
      display: flex; gap: 4px; padding: 10px 14px;
      background: #f1f3f4; border-radius: 16px; border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      width: 6px; height: 6px; background: #aaa; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .widget-input {
      padding: 10px 12px;
      border-top: 1px solid #e8eaed;
      display: flex; gap: 8px; align-items: flex-end;
      background: #fff; flex-shrink: 0;
    }
    .widget-input textarea {
      flex: 1; resize: none;
      border: 1.5px solid #dadce0; border-radius: 20px;
      padding: 8px 14px; font-size: 13.5px; font-family: inherit;
      outline: none; max-height: 80px; line-height: 1.5;
      transition: border-color 0.2s;
    }
    .widget-input textarea:focus { border-color: #1a73e8; }
    .widget-input textarea:disabled { background: #f5f5f5; }

    .w-send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: #1a73e8; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0;
    }
    .w-send-btn:hover { background: #1558b0; }
    .w-send-btn:disabled { background: #dadce0; cursor: not-allowed; }
    .w-send-btn svg { fill: #fff; width: 17px; height: 17px; }

    /* 流程圖更新提示 */
    .flow-updated-badge {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%);
      background: #1a73e8; color: #fff;
      padding: 8px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 12px rgba(26,115,232,0.3);
      animation: badgeIn 0.3s ease, badgeOut 0.3s ease 2.5s forwards;
      z-index: 200;
    }
    @keyframes badgeIn  { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes badgeOut { to{opacity:0;transform:translateX(-50%) translateY(-10px)} }

    #error-banner {
      display: none;
      background: #fce8e6; color: #c5221f;
      padding: 8px 20px; font-size: 13px; text-align: center;
    }
  </style>
</head>
<body>

<!-- 頂部標題 -->
<div class="top-bar">
  <div class="avatar">🗺️</div>
  <div>
    <h2>商旅旅程分析</h2>
    <p><span class="status-dot"></span>AI 助理上線中</p>
  </div>
</div>

<div id="error-banner"></div>

<!-- 主區域：流程圖 -->
<div class="main-area">
  <div id="flow-canvas">
    <div id="flow-nodes">
      <div class="empty-hint" id="empty-hint">
        <div class="icon">🗂️</div>
        <p>在右下角輸入你的商旅流程<br>AI 將自動產生視覺化流程圖</p>
      </div>
    </div>
  </div>
</div>

<!-- 右下角對話框 -->
<div class="chat-widget" id="chat-widget">
  <div class="widget-header" id="widget-header">
    <div class="left">
      <span>🤖</span>
      <span>AI 客服助理</span>
    </div>
    <span class="widget-toggle" id="widget-toggle">▼</span>
  </div>

  <div class="widget-messages" id="widget-messages"></div>

  <div class="widget-input">
    <textarea
      id="user-input"
      rows="1"
      placeholder="輸入訊息，按 Enter 傳送（Shift+Enter 換行）"
      maxlength="2000"
      disabled
    ></textarea>
    <button class="w-send-btn" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // ── 填入你的 GAS 網址 ────────────────────────────────────
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbwnRuyEVd2lIPn3l7vbKOXJonkaA1_AHAbSU7LMRk8gojfxttex8OjTcxDBQ7-dFss-lw/exec';
  // ────────────────────────────────────────────────────────

  var conversationId = null;
  var isWaiting      = false;

  var widgetEl   = document.getElementById('chat-widget');
  var headerEl   = document.getElementById('widget-header');
  var toggleEl   = document.getElementById('widget-toggle');
  var messagesEl = document.getElementById('widget-messages');
  var inputEl    = document.getElementById('user-input');
  var sendBtn    = document.getElementById('send-btn');
  var flowNodes  = document.getElementById('flow-nodes');
  var emptyHint  = document.getElementById('empty-hint');

  // ── 折疊/展開對話框 ──────────────────────────────────────
  headerEl.addEventListener('click', function() {
    widgetEl.classList.toggle('collapsed');
    toggleEl.textContent = widgetEl.classList.contains('collapsed') ? '▲' : '▼';
  });

  // ── 初始化 ───────────────────────────────────────────────
  window.addEventListener('load', function() {
    gasRequest({ action: 'check' })
      .then(function(result) {
        if (result.ok) {
          inputEl.disabled = false;
          sendBtn.disabled = false;
          appendMessage('bot', '你好！請描述你的商旅流程，我會幫你轉成視覺化流程圖 😊');
        } else {
          appendMessage('notice', result.message || '設定異常');
        }
      })
      .catch(function(err) {
        appendMessage('notice', '⚠️ 無法連接到 GAS：' + err.message);
      });
  });

  // ── Auto-resize textarea ──────────────────────────────────
  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 80) + 'px';
  });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  // ── Handle Send ───────────────────────────────────────────
  function handleSend() {
    var text = inputEl.value.trim();
    if (!text || isWaiting) return;

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    isWaiting = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;

    var typingEl = showTyping();
    var params = { action: 'chat', message: text };
    if (conversationId) params.conversationId = conversationId;

    gasRequest(params)
      .then(function(result) {
        removeTyping(typingEl);
        isWaiting = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();

        if (result.error) {
          appendMessage('notice', '⚠️ ' + result.error);
        } else {
          if (result.conversationId) conversationId = result.conversationId;

          // 只在對話框顯示純文字部分（去掉 JSON 區塊）
          var displayReply = stripJsonBlock(result.reply || '（AI 未回覆）');
          appendMessage('bot', displayReply);

          // 如果有合法 JSON，渲染流程圖
          if (result.extractedJson) {
            renderFlowDiagram(result.extractedJson);
            showFlowBadge('✅ 流程圖已更新！');
          }
        }
      })
      .catch(function(err) {
        removeTyping(typingEl);
        isWaiting = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        appendMessage('notice', '⚠️ 連線失敗：' + err.message);
      });
  }

  // ── 移除回覆中的 JSON 區塊，只留對話文字 ────────────────
  function stripJsonBlock(text) {
    return text
      .replace(/```json[\s\S]*?```/gi, '')  // 移除 ```json ... ```
      .replace(/\{[\s\S]*"nodes"[\s\S]*\}/g, '')  // 移除裸 JSON
      .replace(/\n{3,}/g, '\n\n')           // 合併多餘空行
      .trim();
  }

  // ── 渲染流程圖 ────────────────────────────────────────────
  function renderFlowDiagram(flowJson) {
    var nodes = flowJson.nodes;
    if (!nodes || nodes.length === 0) return;

    // 清空舊圖
    flowNodes.innerHTML = '';
    emptyHint.style.display = 'none';

    // 依 y position 排序節點
    nodes.sort(function(a, b) {
      return (a.position && a.position.y || 0) - (b.position && b.position.y || 0);
    });

    nodes.forEach(function(node, idx) {
      // 箭頭（第一個節點前不加）
      if (idx > 0) {
        var arrow = document.createElement('div');
        arrow.className = 'flow-arrow';
        arrow.setAttribute('data-stage', idx - 1);
        flowNodes.appendChild(arrow);
      }

      // 節點卡片
      var card = document.createElement('div');
      card.className = 'flow-node';
      card.setAttribute('data-stage', idx);

      var label = (node.data && node.data.label) || node.id || '節點';
      var desc  = (node.data && node.data.description) || '';

      card.innerHTML =
        '<div class="node-label">' + escapeHtml(label) + '</div>' +
        (desc ? '<div class="node-desc">' + escapeHtml(desc) + '</div>' : '');

      flowNodes.appendChild(card);
    });
  }

  // ── 顯示流程圖更新提示 ────────────────────────────────────
  function showFlowBadge(msg) {
    var badge = document.createElement('div');
    badge.className = 'flow-updated-badge';
    badge.textContent = msg;
    document.body.appendChild(badge);
    setTimeout(function() {
      if (badge.parentNode) badge.parentNode.removeChild(badge);
    }, 3000);
  }

  // ── GAS request ───────────────────────────────────────────
  function gasRequest(params) {
    var url = GAS_URL + '?' + Object.keys(params)
      .map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
      .join('&');
    return fetch(url).then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    });
  }

  // ── 對話框訊息 ────────────────────────────────────────────
  function appendMessage(role, text) {
    var msgEl = document.createElement('div');
    msgEl.className = 'w-message ' + role;

    if (role === 'notice') {
      msgEl.innerHTML = '<div class="w-bubble">' + escapeHtml(text) + '</div>';
    } else {
      var emoji = role === 'user' ? '🧑' : '🤖';
      msgEl.innerHTML =
        '<div class="w-avatar">' + emoji + '</div>' +
        '<div class="w-bubble">' + escapeHtml(text) + '</div>';
    }
    messagesEl.appendChild(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    var wrapEl = document.createElement('div');
    wrapEl.className = 'w-message bot';
    wrapEl.innerHTML =
      '<div class="w-avatar">🤖</div>' +
      '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(wrapEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapEl;
  }
  function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
