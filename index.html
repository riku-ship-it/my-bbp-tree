<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶旅程圖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+TC:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F6F5F0;--surface:#FFF;--s2:#EFEDE7;--border:#E2DFD8;--border2:#C5C1B8;
  --text:#18170F;--t2:#6A6860;--t3:#9A9890;
  --font:'IBM Plex Sans TC',sans-serif;--mono:'IBM Plex Mono',monospace;--r:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}

/* header */
.hd{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hd-title{font-size:15px;font-weight:600;letter-spacing:-.02em;}
.hd-title em{font-style:normal;font-weight:300;color:var(--t2);font-size:13px;margin-left:6px;}
.hd-r{display:flex;gap:8px;align-items:center;}
.badge{font-family:var(--mono);font-size:10px;padding:2px 7px;background:var(--s2);border:1px solid var(--border);border-radius:3px;color:var(--t2);}
.btn{font-family:var(--font);font-size:12px;font-weight:500;padding:5px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;transition:all .12s;}
.btn:hover{border-color:var(--border2);color:var(--text);background:var(--s2);}
.btn-p{background:var(--text);color:#fff;border-color:var(--text);}
.btn-p:hover{background:#3A3830;border-color:#3A3830;color:#fff;}

/* layout */
.layout{display:flex;height:calc(100vh - 50px);}

/* sidebar */
.sb{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sb-sec{padding:14px 12px 6px;}
.sb-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:12px;margin-bottom:2px;transition:all .1s;}
.nav-item:hover{background:var(--s2);color:var(--text);}
.nav-item.active{background:var(--text);color:#fff;}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-tag{margin-left:auto;font-family:var(--mono);font-size:10px;opacity:.6;white-space:nowrap;}
.add-ph{margin:4px 12px 12px;width:calc(100% - 24px);padding:7px;border:1px dashed var(--border2);background:transparent;border-radius:var(--r);font-size:12px;color:var(--t3);cursor:pointer;font-family:var(--font);transition:all .12s;text-align:center;}
.add-ph:hover{color:var(--text);border-color:var(--text);background:var(--s2);}
.sb-leg{padding:12px;border-top:1px solid var(--border);margin-top:auto;}
.leg-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2);margin-bottom:5px;}
.leg-sw{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.manage-btn{margin:8px 0 4px;width:100%;padding:6px;border:1px solid var(--border);background:var(--s2);border-radius:var(--r);font-size:11px;color:var(--t2);cursor:pointer;font-family:var(--font);transition:all .12s;text-align:center;}
.manage-btn:hover{border-color:var(--border2);color:var(--text);}

/* canvas */
.canvas{flex:1;overflow:auto;padding:0;display:flex;flex-direction:column;}

/* ── Timeline — bigger & clearer ── */
.tl-wrap{background:var(--surface);border-bottom:2px solid var(--border);padding:22px 32px 18px;flex-shrink:0;}
.tl{display:flex;align-items:flex-start;position:relative;}
.tl::before{content:'';position:absolute;top:17px;left:17px;right:17px;height:4px;background:var(--border);border-radius:2px;z-index:0;}
.tl-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;cursor:pointer;gap:0;}
.tl-dot{width:34px;height:34px;border-radius:50%;border:4px solid var(--surface);box-shadow:0 0 0 2px #ccc;flex-shrink:0;transition:transform .15s,box-shadow .15s;}
.tl-step:hover .tl-dot{transform:scale(1.1);box-shadow:0 0 0 3px #999;}
.tl-name{font-size:13px;font-weight:600;color:var(--text);margin-top:9px;text-align:center;max-width:100px;line-height:1.35;}
.tl-product{font-size:11px;font-family:var(--mono);color:var(--t3);margin-top:3px;text-align:center;}

/* phases */
.phases-area{padding:20px;flex:1;}
.phase{margin-bottom:16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);overflow:hidden;}
.phase.collapsed .phase-body{display:none;}
.phase-hd{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--s2);cursor:pointer;user-select:none;}
.phase-hd:hover{background:#E8E5DE;}
.phase-bar{width:5px;height:22px;border-radius:3px;flex-shrink:0;}
.ph-name-inp{font-size:14px;font-weight:600;flex:1;min-width:0;outline:none;border:none;background:transparent;font-family:var(--font);color:var(--text);cursor:pointer;}
.ph-name-inp:focus{background:var(--surface);padding:2px 6px;border-radius:4px;outline:1px solid var(--border2);cursor:text;}
.ph-tag-inp{font-size:11px;font-family:var(--mono);color:var(--t3);background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:4px;outline:none;width:90px;flex-shrink:0;}
.ph-tag-inp:focus{border-color:var(--border2);}
.ph-acts{display:flex;gap:3px;}
.chev{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.phase.collapsed .chev{transform:rotate(-90deg);}

/* nodes */
.phase-body{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;}
.nc{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden;border-top-width:3px;transition:box-shadow .12s;}
.nc:hover{box-shadow:0 2px 10px rgba(0,0,0,.08);}
.nc-hd{padding:8px 10px 7px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:7px;}
.nc-num{font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0;padding-top:2px;}
.nc-name{font-size:13px;font-weight:600;flex:1;outline:none;border:none;background:transparent;font-family:var(--font);color:var(--text);resize:none;line-height:1.4;min-height:18px;}
.nc-acts{display:flex;gap:2px;opacity:0;transition:opacity .1s;}
.nc:hover .nc-acts{opacity:1;}
.nc-body{padding:9px 10px;display:flex;flex-direction:column;gap:7px;}

/* fields */
.f{display:flex;flex-direction:column;gap:2px;}
.f-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);}
.f-val{font-size:12px;color:var(--text);outline:none;border:1px solid transparent;background:transparent;font-family:var(--font);padding:3px 5px;border-radius:4px;width:100%;resize:none;min-height:26px;line-height:1.45;transition:border-color .1s,background .1s;}
.f-val:focus{border-color:var(--border2);background:var(--s2);outline:none;}
.f-val::placeholder{color:var(--t3);}

/* owner cols */
.ow-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ow-col{display:flex;flex-direction:column;gap:3px;}
.ow-sub{font-size:10px;color:var(--t3);}
.ow-sel{font-size:11px;font-weight:500;font-family:var(--font);border:1px solid var(--border);border-radius:4px;padding:4px 6px;cursor:pointer;outline:none;width:100%;transition:all .1s;}
.role-inp{font-size:11px;font-family:var(--font);border:1px solid transparent;border-radius:4px;padding:3px 5px;width:100%;background:transparent;color:var(--text);outline:none;transition:border-color .1s,background .1s;}
.role-inp:focus{border-color:var(--border2);background:var(--s2);}
.role-inp::placeholder{color:var(--t3);}

/* handoff */
.hb{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.hb-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);}

/* checklist */
.cl{display:flex;flex-direction:column;gap:4px;}
.cl-item{display:flex;align-items:flex-start;gap:6px;}
.cl-item input[type=checkbox]{margin-top:3px;accent-color:var(--text);flex-shrink:0;cursor:pointer;}
.cl-ta{flex:1;outline:none;border:none;background:transparent;font-family:var(--font);font-size:12px;color:var(--text);resize:none;min-height:16px;line-height:1.4;}
.cl-ta.done{text-decoration:line-through;color:var(--t3);}
.cl-del{opacity:0;font-size:12px;color:var(--t3);cursor:pointer;flex-shrink:0;border:none;background:transparent;font-family:var(--font);padding:0;line-height:1.4;}
.cl-item:hover .cl-del{opacity:1;}
.cl-add{font-size:11px;color:var(--t3);cursor:pointer;border:none;background:transparent;font-family:var(--font);padding:1px 0;text-align:left;transition:color .1s;}
.cl-add:hover{color:var(--text);}

/* risk */
.risk-sel{font-size:10px;font-weight:600;font-family:var(--font);border:1px solid transparent;border-radius:20px;padding:2px 9px;cursor:pointer;outline:none;}
.div{height:1px;background:var(--border);margin:1px 0;}

/* add node */
.add-node{border:1px dashed var(--border2);border-radius:var(--r);text-align:center;font-size:12px;color:var(--t3);cursor:pointer;background:transparent;font-family:var(--font);transition:all .12s;display:flex;align-items:center;justify-content:center;min-height:80px;}
.add-node:hover{border-color:var(--text);color:var(--text);background:var(--s2);}

/* icon btns */
.ib{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;cursor:pointer;color:var(--t3);font-size:13px;transition:all .1s;}
.ib:hover{background:var(--s2);color:var(--text);}
.ib.del:hover{background:#F5DDD3;color:#B02010;}

/* modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);display:none;align-items:center;justify-content:center;z-index:200;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:10px;padding:22px;width:400px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.14);max-height:80vh;overflow-y:auto;}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.m-f{margin-bottom:11px;}
.m-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.m-inp{width:100%;font-family:var(--font);font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--s2);color:var(--text);outline:none;}
.m-inp:focus{border-color:var(--border2);}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.c-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.c-opt:hover{transform:scale(1.15);}
.c-opt.sel{border-color:var(--text);}
.m-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.ow-edit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.ow-color-inp{width:28px;height:28px;padding:0;border:none;background:none;cursor:pointer;border-radius:4px;}

.toast{position:fixed;bottom:18px;right:18px;background:var(--text);color:#fff;font-size:12px;padding:9px 14px;border-radius:6px;opacity:0;transition:opacity .2s;z-index:300;pointer-events:none;}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-title">客戶旅程圖 <em>Customer Journey Map</em></div>
  <div class="hd-r">
    <div class="badge" id="badge">草稿</div>
    <button class="btn" onclick="exportJSON()">匯出 JSON</button>
    <button class="btn" onclick="importTrigger()">匯入</button>
    <button class="btn btn-p" onclick="saveLocal()">儲存</button>
  </div>
</div>

<div class="layout">
  <div class="sb">
    <div class="sb-sec">
      <div class="sb-lbl">旅程階段</div>
      <div id="sb-nav"></div>
      <button class="add-ph" onclick="openAddPhase()">+ 新增階段</button>
    </div>
    <div class="sb-leg">
      <div class="sb-lbl">負責方</div>
      <div id="leg-list"></div>
      <button class="manage-btn" onclick="openManageOwners()">管理負責方</button>
    </div>
  </div>

  <div class="canvas">
    <div class="tl-wrap"><div class="tl" id="tl"></div></div>
    <div class="phases-area" id="phases-area"></div>
  </div>
</div>

<!-- Add Phase Modal -->
<div class="overlay" id="modal-phase">
  <div class="modal">
    <h3>新增旅程階段</h3>
    <div class="m-f"><div class="m-lbl">階段名稱</div><input class="m-inp" id="m-name" placeholder="例：免費研習班"></div>
    <div class="m-f"><div class="m-lbl">產品代號（選填）</div><input class="m-inp" id="m-product" placeholder="例：SBBG、MBA / BOP"></div>
    <div class="m-f"><div class="m-lbl">顏色</div><div class="color-row" id="color-row"></div></div>
    <div class="m-acts">
      <button class="btn" onclick="closeModal('modal-phase')">取消</button>
      <button class="btn btn-p" onclick="confirmAddPhase()">新增</button>
    </div>
  </div>
</div>

<!-- Manage Owners Modal -->
<div class="overlay" id="modal-owners">
  <div class="modal" style="width:420px">
    <h3>管理負責方</h3>
    <div id="owners-editor"></div>
    <div style="margin-top:12px"><button class="btn" onclick="addOwner()">+ 新增負責方</button></div>
    <div class="m-acts"><button class="btn btn-p" onclick="closeModal('modal-owners');render()">完成</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const DEFAULT_OWNERS=[
  {v:'mkt',  l:'行銷 / 廣告', bg:'#F0E8FC',b:'#9B68D0',t:'#360A60'},
  {v:'sales',l:'業務',         bg:'#D3EDE0',b:'#5BB894',t:'#0A4D30'},
  {v:'ops',  l:'活動營運',     bg:'#FDF0D3',b:'#D0A855',t:'#604510'},
  {v:'tchr', l:'講師',         bg:'#D8F4DC',b:'#4CAF70',t:'#0A3D1A'},
  {v:'cs',   l:'客服 / 售後',  bg:'#FCE0D8',b:'#D4735A',t:'#5C1A08'},
  {v:'you',  l:'你（產品側）', bg:'#D3E5F5',b:'#5594D0',t:'#0A3560'},
  {v:'dis',  l:'爭議 / 待定',  bg:'#F8DDD3',b:'#D06855',t:'#60180A'},
];
const RISKS=[
  {v:'none',l:'—',      bg:'#EDEAE3',c:'#9A9890',b:'#C5C1B8'},
  {v:'low', l:'低風險', bg:'#D3EDE0',c:'#0A4D30',b:'#5BB894'},
  {v:'mid', l:'中風險', bg:'#F5EDD3',c:'#604510',b:'#D0A855'},
  {v:'high',l:'高風險', bg:'#F5DDD3',c:'#60180A',b:'#D06855'},
];
const PHASE_COLORS=['#5BB894','#5594D0','#9B68D0','#D0A855','#D06855','#6BB8C8','#90B060','#C86BAA','#6878D0','#A86060'];
let pickColor=PHASE_COLORS[0];
let data={};

const uid=()=>Math.random().toString(36).slice(2,8);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getOwner=v=>(data.owners||DEFAULT_OWNERS).find(o=>o.v===v)||(data.owners||DEFAULT_OWNERS).at(-1)||DEFAULT_OWNERS.at(-1);
const getRisk=v=>RISKS.find(r=>r.v===v)||RISKS[0];
const ag=el=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};
const mkDiv=cls=>{const d=document.createElement('div');d.className=cls;return d;};
const showToast=msg=>{const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);};

function defaultData(){
  const p=()=>uid();
  return{title:'客戶旅程圖',owners:JSON.parse(JSON.stringify(DEFAULT_OWNERS)),phases:[
    {id:p(),name:'探索與接觸',color:'#5BB894',product:'',collapsed:false,nodes:[
      {id:p(),name:'廣告曝光',customerAction:'在社群、搜尋引擎或口碑推薦看到資訊',ownerMain:'mkt',ownerMainRole:'行銷 / 廣告',ownerSub:'',ownerSubRole:'',product:'',items:[{id:p(),text:'投放廣告素材（社群 / Google）',done:false},{id:p(),text:'落地頁 / 報名頁設計',done:false},{id:p(),text:'追蹤碼設置（GA / Pixel）',done:false}],handoffOwner:'mkt',handoffRole:'行銷 / 廣告',handoffAction:'點擊廣告後引導至報名頁',risk:'none',notes:''},
      {id:p(),name:'主動搜尋',customerAction:'Google 搜尋、看官網或 YouTube 頻道',ownerMain:'mkt',ownerMainRole:'行銷 / 廣告',ownerSub:'',ownerSubRole:'',product:'',items:[{id:p(),text:'SEO / 關鍵字優化',done:false},{id:p(),text:'YouTube 頻道內容維護',done:false},{id:p(),text:'官網資訊更新',done:false}],handoffOwner:'mkt',handoffRole:'行銷 / 廣告',handoffAction:'官網引導至 SBBG 報名入口',risk:'none',notes:''},
    ]},
    {id:p(),name:'免費研習班',color:'#5594D0',product:'SBBG',collapsed:false,nodes:[
      {id:p(),name:'看到 SBBG 宣傳',customerAction:'看到免費研習班廣告或介紹，產生興趣',ownerMain:'mkt',ownerMainRole:'行銷 / 廣告',ownerSub:'',ownerSubRole:'',product:'SBBG 宣傳素材',items:[{id:p(),text:'SBBG 宣傳文案與素材',done:false},{id:p(),text:'報名頁面設計',done:false}],handoffOwner:'ops',handoffRole:'活動營運',handoffAction:'有意願者點擊報名，交接行政處理報名資料',risk:'none',notes:''},
      {id:p(),name:'報名 SBBG',customerAction:'填寫免費研習班報名表',ownerMain:'ops',ownerMainRole:'活動營運',ownerSub:'sales',ownerSubRole:'業務',product:'SBBG 報名頁面',items:[{id:p(),text:'確認報名資料完整',done:false},{id:p(),text:'寄送報到提醒信',done:false},{id:p(),text:'建立學員名單',done:false}],handoffOwner:'ops',handoffRole:'活動營運',handoffAction:'開課前，交接活動執行準備場地與名單',risk:'low',notes:''},
      {id:p(),name:'參加 SBBG',customerAction:'出席免費研習班，接觸課程內容與講師',ownerMain:'tchr',ownerMainRole:'講師',ownerSub:'ops',ownerSubRole:'活動營運',product:'SBBG 課程',items:[{id:p(),text:'場地佈置與設備確認',done:false},{id:p(),text:'學員報到確認',done:false},{id:p(),text:'課程執行',done:false},{id:p(),text:'現場收集反饋',done:false}],handoffOwner:'sales',handoffRole:'業務',handoffAction:'課程結束後，業務現場或後續跟進意願',risk:'mid',notes:'⚠ 最關鍵的轉化節點，課程品質直接影響後續報名率'},

// ── render ──
function render(){renderLegend();renderSb();renderTl();renderPhases();}

function renderLegend(){
  const el=document.getElementById('leg-list');el.innerHTML='';
  (data.owners||DEFAULT_OWNERS).forEach(o=>{
    const row=document.createElement('div');row.className='leg-item';
    row.innerHTML=`<div class="leg-sw" style="background:${o.b}"></div><span>${o.l}</span>`;
    el.appendChild(row);
  });
}

function renderSb(){
  const nav=document.getElementById('sb-nav');nav.innerHTML='';
  data.phases.forEach(ph=>{
    const el=document.createElement('div');el.className='nav-item';
    el.innerHTML=`<div class="nav-dot" style="background:${ph.color}"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ph.name}</span>${ph.product?`<span class="nav-tag">${ph.product}</span>`:''}`;
    el.onclick=()=>{document.getElementById('ph-'+ph.id)?.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');};
    nav.appendChild(el);
  });
}

function renderTl(){
  const tl=document.getElementById('tl');tl.innerHTML='';
  data.phases.forEach(ph=>{
    const step=document.createElement('div');step.className='tl-step';
    step.innerHTML=`<div class="tl-dot" style="background:${ph.color};box-shadow:0 0 0 2px ${ph.color}55"></div><div class="tl-name">${ph.name}</div>${ph.product?`<div class="tl-product">${ph.product}</div>`:''}`;
    step.onclick=()=>document.getElementById('ph-'+ph.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    tl.appendChild(step);
  });
}

function renderPhases(){
  const area=document.getElementById('phases-area');area.innerHTML='';
  if(!data.phases.length){area.innerHTML='<div style="text-align:center;padding:40px;color:var(--t3)">尚無階段，點左側「新增階段」開始</div>';return;}
  data.phases.forEach(ph=>area.appendChild(buildPhase(ph)));
}

function buildPhase(ph){
  const block=document.createElement('div');block.className='phase'+(ph.collapsed?' collapsed':'');block.id='ph-'+ph.id;
  const hd=document.createElement('div');hd.className='phase-hd';
  hd.innerHTML=`<div class="phase-bar" style="background:${ph.color}"></div><input class="ph-name-inp" value="${esc(ph.name)}" placeholder="階段名稱" onclick="event.stopPropagation()" onchange="mutPh('${ph.id}','name',this.value)"><input class="ph-tag-inp" value="${esc(ph.product)}" placeholder="產品代號" onclick="event.stopPropagation()" onchange="mutPh('${ph.id}','product',this.value)"><div class="ph-acts" onclick="event.stopPropagation()"><button class="ib" onclick="movePh('${ph.id}',-1)">↑</button><button class="ib" onclick="movePh('${ph.id}',1)">↓</button><button class="ib del" onclick="delPh('${ph.id}')">✕</button></div><div class="chev">▾</div>`;
  hd.addEventListener('click',e=>{if(['INPUT','BUTTON'].includes(e.target.tagName))return;ph.collapsed=!ph.collapsed;block.classList.toggle('collapsed',ph.collapsed);autoSave();});
  block.appendChild(hd);
  const body=document.createElement('div');body.className='phase-body';
  ph.nodes.forEach((n,i)=>body.appendChild(buildNode(ph,n,i)));
  const ab=document.createElement('button');ab.className='add-node';ab.textContent='+ 新增節點';ab.onclick=()=>addNode(ph.id);
  body.appendChild(ab);block.appendChild(body);return block;
}

function buildNode(ph,n,idx){
  const ow=getOwner(n.ownerMain);
  const card=document.createElement('div');card.className='nc';card.id='nc-'+n.id;card.style.borderTopColor=ow.b;
  const hdr=document.createElement('div');hdr.className='nc-hd';
  hdr.innerHTML=`<span class="nc-num">${String(idx+1).padStart(2,'0')}</span><textarea class="nc-name" rows="1" placeholder="節點名稱" oninput="ag(this);mutN('${ph.id}','${n.id}','name',this.value)">${esc(n.name)}</textarea><div class="nc-acts"><button class="ib" onclick="moveN('${ph.id}','${n.id}',-1)">↑</button><button class="ib" onclick="moveN('${ph.id}','${n.id}',1)">↓</button><button class="ib del" onclick="delN('${ph.id}','${n.id}')">✕</button></div>`;
  card.appendChild(hdr);
  const body=document.createElement('div');body.className='nc-body';
  body.appendChild(buildTa('客戶行動',n.customerAction,v=>mutN(ph.id,n.id,'customerAction',v),'這個節點客戶要做什麼？'));
  // owner
  const owF=document.createElement('div');owF.className='f';owF.innerHTML='<div class="f-lbl">負責人</div>';
  const owG=document.createElement('div');owG.className='ow-grid';
  owG.appendChild(buildOwCol('本節點負責方',n.ownerMain,n.ownerMainRole,v=>{mutN(ph.id,n.id,'ownerMain',v);card.style.borderTopColor=getOwner(v).b;},v=>mutN(ph.id,n.id,'ownerMainRole',v)));
  owG.appendChild(buildOwCol('銜接下節點負責方',n.ownerSub,n.ownerSubRole,v=>mutN(ph.id,n.id,'ownerSub',v),v=>mutN(ph.id,n.id,'ownerSubRole',v)));
  owF.appendChild(owG);body.appendChild(owF);
  // handoff
  const hb=document.createElement('div');hb.className='hb';hb.innerHTML='<div class="hb-lbl">銜接說明（交接條件）</div>';
  const hta=document.createElement('textarea');hta.className='f-val';hta.value=n.handoffAction||'';hta.placeholder='什麼條件下交接？交接哪些資訊？';hta.rows=1;hta.oninput=function(){ag(this);mutN(ph.id,n.id,'handoffAction',this.value);};hb.appendChild(hta);setTimeout(()=>ag(hta),0);body.appendChild(hb);
  body.appendChild(mkDiv('div'));
  body.appendChild(buildTa('使用產品 / 工具',n.product,v=>mutN(ph.id,n.id,'product',v),'本節點使用的產品或工具'));
  body.appendChild(mkDiv('div'));
  // checklist
  const clf=document.createElement('div');clf.className='f';clf.innerHTML='<div class="f-lbl">導入項目清單</div>';
  const cl=document.createElement('div');cl.className='cl';cl.id='cl-'+n.id;
  n.items.forEach(it=>cl.appendChild(buildClItem(ph.id,n.id,it)));
  const ca=document.createElement('button');ca.className='cl-add';ca.textContent='+ 新增項目';ca.onclick=()=>addItem(ph.id,n.id);cl.appendChild(ca);clf.appendChild(cl);body.appendChild(clf);
  body.appendChild(mkDiv('div'));
  // risk
  const rkF=document.createElement('div');rkF.className='f';rkF.innerHTML='<div class="f-lbl">風險標示</div>';
  const rk=getRisk(n.risk);const rkSel=document.createElement('select');rkSel.className='risk-sel';applyRisk(rkSel,rk);
  RISKS.forEach(r=>{const o=document.createElement('option');o.value=r.v;o.textContent=r.l;if(r.v===n.risk)o.selected=true;rkSel.appendChild(o);});
  rkSel.onchange=function(){mutN(ph.id,n.id,'risk',this.value);applyRisk(this,getRisk(this.value));};rkF.appendChild(rkSel);body.appendChild(rkF);
  body.appendChild(buildTa('備註 / 注意事項',n.notes,v=>mutN(ph.id,n.id,'notes',v),'補充說明、爭議點…'));
  card.appendChild(body);return card;
}

function applyRisk(el,r){el.style.background=r.bg;el.style.color=r.c;el.style.borderColor=r.b;}

function buildOwCol(label,owVal,roleVal,onOwner,onRole){
  const col=document.createElement('div');col.className='ow-col';col.innerHTML=`<div class="ow-sub">${label}</div>`;
  const ow=getOwner(owVal);
  const sel=document.createElement('select');sel.className='ow-sel';sel.style.background=ow.bg;sel.style.borderColor=ow.b;sel.style.color=ow.t;
  (data.owners||DEFAULT_OWNERS).forEach(o=>{const opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;if(o.v===owVal)opt.selected=true;sel.appendChild(opt);});
  sel.onchange=function(){const o2=getOwner(this.value);this.style.background=o2.bg;this.style.borderColor=o2.b;this.style.color=o2.t;onOwner(this.value);};
  const ri=document.createElement('input');ri.className='role-inp';ri.value=roleVal||'';ri.placeholder='職稱 / 姓名';ri.oninput=function(){onRole(this.value);};
  col.appendChild(sel);col.appendChild(ri);return col;
}

function buildTa(label,val,onChange,placeholder){
  const row=document.createElement('div');row.className='f';row.innerHTML=`<div class="f-lbl">${label}</div>`;
  const ta=document.createElement('textarea');ta.className='f-val';ta.value=val||'';ta.placeholder=placeholder||'';ta.rows=1;ta.oninput=function(){ag(this);onChange(this.value);};
  row.appendChild(ta);setTimeout(()=>ag(ta),0);return row;
}

function buildClItem(pid,nid,item){
  const row=document.createElement('div');row.className='cl-item';row.id='cli-'+item.id;
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=item.done;
  const ta=document.createElement('textarea');ta.className='cl-ta'+(item.done?' done':'');ta.value=item.text;ta.rows=1;ta.placeholder='項目內容…';ta.oninput=function(){ag(this);mutItem(pid,nid,item.id,'text',this.value);};setTimeout(()=>ag(ta),0);
  cb.onchange=function(){mutItem(pid,nid,item.id,'done',this.checked);ta.classList.toggle('done',this.checked);};
  const del=document.createElement('button');del.className='cl-del';del.textContent='✕';del.onclick=()=>{delItem(pid,nid,item.id);document.getElementById('cli-'+item.id)?.remove();};
  row.appendChild(cb);row.appendChild(ta);row.appendChild(del);return row;
}

// mutations
function mutPh(id,k,v){const ph=data.phases.find(p=>p.id===id);if(ph){ph[k]=v;autoSave();if(k==='name'||k==='product'){renderSb();renderTl();}}}
function mutN(pid,nid,k,v){const ph=data.phases.find(p=>p.id===pid);if(!ph)return;const n=ph.nodes.find(n=>n.id===nid);if(n){n[k]=v;autoSave();}}
function mutItem(pid,nid,iid,k,v){const ph=data.phases.find(p=>p.id===pid);if(!ph)return;const n=ph.nodes.find(n=>n.id===nid);if(!n)return;const it=n.items.find(i=>i.id===iid);if(it){it[k]=v;autoSave();}}
function addNode(pid){const ph=data.phases.find(p=>p.id===pid);if(!ph)return;ph.nodes.push({id:uid(),name:'',customerAction:'',ownerMain:(data.owners[0]||{}).v||'mkt',ownerMainRole:'',ownerSub:'',ownerSubRole:'',product:'',items:[],handoffOwner:'',handoffRole:'',handoffAction:'',risk:'none',notes:''});render();autoSave();setTimeout(()=>document.getElementById('ph-'+pid)?.scrollIntoView({behavior:'smooth',block:'end'}),80);}
function delN(pid,nid){if(!confirm('刪除此節點？'))return;const ph=data.phases.find(p=>p.id===pid);if(ph){ph.nodes=ph.nodes.filter(n=>n.id!==nid);render();autoSave();}}
function moveN(pid,nid,dir){const ph=data.phases.find(p=>p.id===pid);if(!ph)return;const i=ph.nodes.findIndex(n=>n.id===nid);const j=i+dir;if(j<0||j>=ph.nodes.length)return;[ph.nodes[i],ph.nodes[j]]=[ph.nodes[j],ph.nodes[i]];render();autoSave();}
function addItem(pid,nid){const ph=data.phases.find(p=>p.id===pid);if(!ph)return;const n=ph.nodes.find(n=>n.id===nid);if(!n)return;const it={id:uid(),text:'',done:false};n.items.push(it);const cl=document.getElementById('cl-'+nid);if(cl){const el=buildClItem(pid,nid,it);cl.insertBefore(el,cl.lastElementChild);setTimeout(()=>ag(el.querySelector('textarea')),0);}autoSave();}
function delItem(pid,nid,iid){const ph=data.phases.find(p=>p.id===pid);if(!ph)return;const n=ph.nodes.find(n=>n.id===nid);if(!n)return;n.items=n.items.filter(i=>i.id!==iid);autoSave();}
function movePh(id,dir){const i=data.phases.findIndex(p=>p.id===id);const j=i+dir;if(j<0||j>=data.phases.length)return;[data.phases[i],data.phases[j]]=[data.phases[j],data.phases[i]];render();autoSave();}
function delPh(id){if(!confirm('刪除此階段及所有節點？'))return;data.phases=data.phases.filter(p=>p.id!==id);render();autoSave();}

// add phase modal
function openAddPhase(){pickColor=PHASE_COLORS[data.phases.length%PHASE_COLORS.length];document.getElementById('m-name').value='';document.getElementById('m-product').value='';renderColorRow();document.getElementById('modal-phase').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);}
function confirmAddPhase(){const name=document.getElementById('m-name').value.trim()||'新階段';const product=document.getElementById('m-product').value.trim();data.phases.push({id:uid(),name,color:pickColor,product,collapsed:false,nodes:[]});closeModal('modal-phase');render();autoSave();}
function renderColorRow(){const row=document.getElementById('color-row');row.innerHTML='';PHASE_COLORS.forEach(c=>{const el=document.createElement('div');el.className='c-opt'+(c===pickColor?' sel':'');el.style.background=c;el.onclick=()=>{pickColor=c;document.querySelectorAll('.c-opt').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');};row.appendChild(el);});}

// manage owners modal
function openManageOwners(){renderOwnersEditor();document.getElementById('modal-owners').classList.add('open');}
function renderOwnersEditor(){
  const el=document.getElementById('owners-editor');el.innerHTML='';
  (data.owners||DEFAULT_OWNERS).forEach((o,i)=>{
    const row=document.createElement('div');row.className='ow-edit-row';
    const swatch=document.createElement('div');swatch.style.cssText=`width:12px;height:12px;border-radius:3px;background:${o.b};flex-shrink:0`;
    const nameInp=document.createElement('input');nameInp.className='m-inp';nameInp.style.cssText='flex:1;font-size:12px;padding:4px 6px';nameInp.value=o.l;nameInp.oninput=function(){data.owners[i].l=this.value;autoSave();};
    const colorInp=document.createElement('input');colorInp.type='color';colorInp.className='ow-color-inp';colorInp.value=o.b;colorInp.oninput=function(){data.owners[i].b=this.value;data.owners[i].bg=this.value+'22';swatch.style.background=this.value;autoSave();};
    const delBtn=document.createElement('button');delBtn.className='ib del';delBtn.textContent='✕';delBtn.onclick=()=>{data.owners.splice(i,1);renderOwnersEditor();autoSave();};
    row.appendChild(swatch);row.appendChild(nameInp);row.appendChild(colorInp);row.appendChild(delBtn);el.appendChild(row);
  });
}
function addOwner(){if(!data.owners)data.owners=JSON.parse(JSON.stringify(DEFAULT_OWNERS));data.owners.push({v:'ow'+uid(),l:'新負責方',bg:'#EDEAE3',b:'#A8A49C',t:'#50504A'});renderOwnersEditor();autoSave();}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
document.getElementById('modal-phase').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddPhase();if(e.key==='Escape')closeModal('modal-phase');});

// persist
function autoSave(){try{localStorage.setItem('cjm_v5',JSON.stringify(data));const b=document.getElementById('badge');const t=new Date();b.textContent=`已儲存 ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;}catch(e){}}
function saveLocal(){autoSave();showToast('已儲存');}
function exportJSON(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='客戶旅程圖.json';a.click();showToast('已匯出 JSON');}
function importTrigger(){document.getElementById('file-input').click();}
function handleImport(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.phases){data=d;if(!data.owners)data.owners=JSON.parse(JSON.stringify(DEFAULT_OWNERS));render();autoSave();showToast('匯入成功');}else alert('格式不正確');}catch{alert('無法解析 JSON');}};reader.readAsText(file);e.target.value='';}

// init
try{const saved=localStorage.getItem('cjm_v5');data=saved?JSON.parse(saved):defaultData();if(!data.owners)data.owners=JSON.parse(JSON.stringify(DEFAULT_OWNERS));}catch{data=defaultData();}
render();
</script>
