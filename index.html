<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶旅程地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F0;
  --card: #FFFFFF;
  --ink: #1A1917;
  --ink2: #6B6860;
  --ink3: #ABABAB;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);

  /* row colours */
  --row-persona-bg: #FEF9EC;
  --row-stage-bg:   #EBF0FE;
  --row-stage-txt:  #3B4FCC;
  --row-action-bg:  #F0ECFF;
  --row-action-lbl: #5B3FCC;
  --row-touch-bg:   #E8F5F0;
  --row-touch-lbl:  #1A7A56;
  --row-pain-bg:    #FEF0EE;
  --row-pain-lbl:   #C0392B;
  --row-owner-bg:   #FEF8EC;
  --row-owner-lbl:  #B45309;

  --r: 10px;
  --ease: cubic-bezier(.4,0,.2,1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 44px 40px 100px;
}

/* ── HEADER ── */
.hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 40px; gap: 24px; }
.hdr-left { flex: 1; }
.eyebrow { font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }
h1 { font-family: 'Instrument Serif', serif; font-size: 32px; font-weight: 400; color: var(--ink); outline: none; border-bottom: 1.5px solid transparent; transition: border-color .15s; cursor: text; display: inline-block; padding-bottom: 2px; }
h1:focus { border-bottom-color: var(--ink2); }
.sub { font-size: 12px; color: var(--ink3); margin-top: 6px; outline: none; cursor: text; display: inline-block; border-bottom: 1px solid transparent; transition: border-color .15s; }
.sub:focus { border-bottom-color: var(--border2); }
.hdr-btns { display: flex; gap: 8px; margin-top: 4px; }
.btn { font-family: inherit; font-size: 12px; font-weight: 500; padding: 7px 15px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border2); background: var(--card); color: var(--ink2); transition: all .15s; }
.btn:hover { background: #ECEAE4; color: var(--ink); }
.btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
.btn.primary:hover { opacity: .85; }

/* ── JOURNEY TABLE ── */
.journey { width: 100%; border-collapse: separate; border-spacing: 0; }

/* Row label column */
.row-label {
  width: 100px; min-width: 80px;
  font-size: 11px; font-weight: 600; color: var(--ink2); letter-spacing: .03em;
  vertical-align: middle; padding: 14px 16px 14px 0;
  white-space: nowrap; text-align: right;
  border-right: 1.5px solid var(--border2);
  user-select: none;
}

/* ── PERSONA ROW ── */
.persona-row td { background: var(--row-persona-bg); border-radius: var(--r); }
.persona-cell {
  padding: 16px 20px;
  border-bottom: none;
}
.persona-grid { display: flex; gap: 16px; }
.persona-block { flex: 1; }
.persona-tag { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #B45309; margin-bottom: 4px; }
.persona-text {
  font-size: 12px; color: var(--ink2); outline: none; cursor: text;
  border-bottom: 1px solid transparent; transition: border-color .15s; display: block; min-height: 18px;
}
.persona-text:focus { border-bottom-color: var(--border2); color: var(--ink); }
.persona-text[placeholder]:empty::before { content: attr(placeholder); color: var(--ink3); opacity: .6; }

/* ── STAGE ROW ── */
.stages-tr td { padding: 10px 0 0; }
.stages-inner { display: flex; gap: 8px; align-items: stretch; }
.stage-arrow {
  flex: 1; position: relative;
  background: var(--row-stage-bg); border-radius: var(--r);
  padding: 13px 20px 13px 16px; cursor: pointer;
  transition: background .15s;
  min-height: 48px;
  display: flex; align-items: center; justify-content: center;
}
.stage-arrow::after {
  content: '';
  position: absolute; right: -13px; top: 50%; transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 24px solid transparent;
  border-bottom: 24px solid transparent;
  border-left: 14px solid var(--row-stage-bg);
  z-index: 2;
}
.stage-arrow:last-child::after { display: none; }
.stage-title-inp {
  font-family: inherit; font-size: 13px; font-weight: 700;
  color: var(--row-stage-txt); background: none; border: none; outline: none;
  text-align: center; width: 100%; cursor: pointer;
  letter-spacing: .01em;
}
.stage-title-inp:focus { cursor: text; }
.stage-add-btn {
  width: 40px; flex-shrink: 0; border-radius: var(--r);
  background: none; border: 1.5px dashed var(--border2); cursor: pointer;
  font-size: 20px; color: var(--ink3); transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.stage-add-btn:hover { border-color: var(--ink3); color: var(--ink); background: #ECEAE4; }

/* ── CONTENT ROWS ── */
.content-tr { }
.content-tr td { padding: 8px 0 0; }
.content-inner { display: flex; gap: 8px; }
.content-cell {
  flex: 1; border-radius: var(--r);
  padding: 14px 16px; min-height: 72px;
  font-size: 12px; line-height: 1.65; color: var(--ink2);
  outline: none; cursor: text; transition: box-shadow .15s;
  position: relative;
}
.content-cell:focus { box-shadow: inset 0 0 0 1.5px var(--border2); }
.content-cell[placeholder]:empty::before { content: attr(placeholder); color: var(--ink3); opacity: .5; font-style: italic; }

.action-cell  { background: var(--row-action-bg); }
.touch-cell   { background: var(--row-touch-bg); }
.pain-cell    { background: var(--row-pain-bg); }

/* ── OWNER ROW ── */
.owner-tr td { padding: 8px 0 0; }
.owner-inner { display: flex; gap: 8px; }
.owner-cell {
  flex: 1; border-radius: var(--r);
  background: var(--row-owner-bg);
  padding: 12px 16px; min-height: 52px;
  display: flex; flex-wrap: wrap; gap: 5px; align-items: flex-start; align-content: flex-start;
}
.owner-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 3px 8px 3px 10px; border-radius: 20px;
  background: #fff; border: 1px solid #FDE68A; color: var(--row-owner-lbl);
  line-height: 1.5;
}
.chip-txt { outline: none; min-width: 20px; max-width: 90px; white-space: nowrap; cursor: text; }
.chip-del {
  width: 13px; height: 13px; border-radius: 50%;
  background: rgba(180,83,9,.12); border: none; cursor: pointer;
  font-size: 8px; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .12s; flex-shrink: 0; padding: 0; line-height: 1;
  color: var(--row-owner-lbl);
}
.owner-chip:hover .chip-del { opacity: 1; }
.owner-add {
  font-family: inherit; font-size: 10px; color: var(--ink3);
  background: none; border: 1px dashed var(--border2); border-radius: 20px;
  padding: 2px 8px; cursor: pointer; transition: all .15s; align-self: center;
}
.owner-add:hover { color: var(--ink); border-color: var(--ink3); background: rgba(0,0,0,.04); }

/* ── ROW SPACER ── */
.spacer-tr td { height: 6px; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(14px); background: var(--ink); color: #fff; font-size: 12px; font-weight: 500; padding: 10px 20px; border-radius: 10px; opacity: 0; transition: all .22s; pointer-events: none; z-index: 99; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* stage delete button (shown on hover) */
.stage-del { position: absolute; top: 4px; right: 18px; font-size: 9px; color: #A8A0FF; opacity: 0; cursor: pointer; background: none; border: none; transition: opacity .15s; }
.stage-arrow:hover .stage-del { opacity: 1; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <p class="eyebrow">Customer Journey Map</p>
    <h1 contenteditable="true" spellcheck="false">客戶旅程地圖</h1>
    <p class="sub" contenteditable="true" spellcheck="false">所有欄位皆可直接點擊編輯</p>
  </div>
  <div class="hdr-btns">
    <button class="btn" onclick="exportJSON()">匯出 JSON</button>
    <button class="btn primary" onclick="saveHTML()">儲存 HTML</button>
  </div>
</div>

<table class="journey" id="journeyTable">
  <tbody id="journeyBody"></tbody>
</table>

<div class="toast" id="toast"></div>

<script>
let data = {
  persona: {
    scenario: '用戶首次聽說產品後，嘗試了解並評估是否適合團隊使用',
    goal: '找到一套能提升團隊協作效率的工具，並順利導入日常工作流程'
  },
  stages: [
    { id: 1, title: '認知' },
    { id: 2, title: '考慮評估' },
    { id: 3, title: '購買決策' },
    { id: 4, title: '導入使用' },
    { id: 5, title: '留存擴張' }
  ],
  rows: {
    action: {
      label: '使用者行為',
      cells: ['透過社群廣告與朋友推薦首次接觸品牌', '主動搜尋、比較競品，閱讀評測文章', '申請 Demo，與業務討論報價與合約', '完成帳號設定、參加 onboarding 課程', '深度使用核心功能，介紹給同事']
    },
    touch: {
      label: '觸點',
      cells: ['社群廣告、口碑推薦、SEO', '官網、比較頁面、試用申請', 'Demo 會議、報價單、合約', 'Welcome email、教學文件、CS 會議', '定期回顧信件、功能更新、NPS 調查']
    },
    pain: {
      label: '痛點',
      cells: ['不知道品牌存在，資訊雜亂', '競品太多難以比較，功能說明不清楚', '決策流程太長，內部難以說服', '設定步驟複雜，缺乏即時引導', '進階功能使用率低，不確定是否續約']
    }
  },
  owners: {
    cells: [
      ['行銷'],
      ['行銷', '產品'],
      ['業務'],
      ['CS', '產品'],
      ['CS', '業務']
    ]
  }
};

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const n = () => data.stages.length;

function render() {
  const body = document.getElementById('journeyBody');
  body.innerHTML = '';

  // ── PERSONA ROW ──
  const pTr = document.createElement('tr');
  pTr.className = 'persona-row';
  pTr.innerHTML = `
    <td class="row-label" style="vertical-align:middle;padding-top:0;border-right:none"></td>
    <td colspan="${n()}" class="persona-cell">
      <div class="persona-grid">
        <div class="persona-block">
          <div class="persona-tag">情境 Scenario</div>
          <span class="persona-text" contenteditable="true" spellcheck="false"
            placeholder="描述用戶的使用情境…"
            onblur="data.persona.scenario=this.innerText.trim()"
          >${esc(data.persona.scenario)}</span>
        </div>
        <div class="persona-block">
          <div class="persona-tag">目標 Goal</div>
          <span class="persona-text" contenteditable="true" spellcheck="false"
            placeholder="描述用戶的核心目標…"
            onblur="data.persona.goal=this.innerText.trim()"
          >${esc(data.persona.goal)}</span>
        </div>
      </div>
    </td>`;
  body.appendChild(pTr);

  // spacer
  body.appendChild(spacer());

  // ── STAGE ROW ──
  const sTr = document.createElement('tr');
  sTr.className = 'stages-tr';
  sTr.innerHTML = `<td class="row-label">階段</td><td colspan="${n()}">
    <div class="stages-inner">
      ${data.stages.map(s => `
        <div class="stage-arrow" id="sa${s.id}">
          <input class="stage-title-inp" value="${esc(s.title)}"
            oninput="updStage(${s.id},'title',this.value)">
          ${data.stages.length > 1 ? `<button class="stage-del" onclick="rmStage(${s.id})" title="刪除">✕</button>` : ''}
        </div>`).join('')}
      <button class="stage-add-btn" onclick="addStage()" title="新增階段">+</button>
    </div>
  </td>`;
  body.appendChild(sTr);

  // ── CONTENT ROWS ──
  [
    { key: 'action', label: '使用者行為', cls: 'action-cell', ph: '描述此階段的使用者行為…' },
    { key: 'touch',  label: '觸點',       cls: 'touch-cell',  ph: '列出主要接觸管道…' },
    { key: 'pain',   label: '痛點',       cls: 'pain-cell',   ph: '描述用戶的痛點或阻礙…' }
  ].forEach(row => {
    body.appendChild(spacer());
    const tr = document.createElement('tr');
    tr.className = 'content-tr';
    // ensure enough cells
    while (data.rows[row.key].cells.length < n()) data.rows[row.key].cells.push('');
    const cells = data.stages.map((s, i) => `
      <div class="content-cell ${row.cls}" contenteditable="true" spellcheck="false"
        placeholder="${row.ph}"
        onblur="data.rows['${row.key}'].cells[${i}]=this.innerText.trim()"
      >${esc(data.rows[row.key].cells[i]||'')}</div>`).join('');
    tr.innerHTML = `<td class="row-label">${row.label}</td><td colspan="${n()}"><div class="content-inner">${cells}</div></td>`;
    body.appendChild(tr);
  });

  // ── OWNER ROW ──
  body.appendChild(spacer());
  while (data.owners.cells.length < n()) data.owners.cells.push([]);
  const oTr = document.createElement('tr');
  oTr.className = 'owner-tr';
  const ownerCells = data.stages.map((s, i) => {
    const chips = (data.owners.cells[i]||[]).map(t => `
      <span class="owner-chip">
        <span class="chip-txt" contenteditable="true" spellcheck="false"
          onblur="syncOwner(${i},this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        >${esc(t)}</span>
        <button class="chip-del" onclick="rmOwnerChip(${i},this)">✕</button>
      </span>`).join('');
    return `<div class="owner-cell" id="ow${i}">
      ${chips}
      <button class="owner-add" onclick="addOwnerChip(${i})">+ 新增</button>
    </div>`;
  }).join('');
  oTr.innerHTML = `<td class="row-label">所有權分工</td><td colspan="${n()}"><div class="owner-inner">${ownerCells}</div></td>`;
  body.appendChild(oTr);
}

function spacer() {
  const tr = document.createElement('tr');
  tr.className = 'spacer-tr';
  tr.innerHTML = `<td></td><td colspan="${n()}"></td>`;
  return tr;
}

// Stage ops
function updStage(id, key, val) { const s = data.stages.find(x => x.id === id); if (s) s[key] = val; }
function addStage() {
  const id = Date.now();
  data.stages.push({ id, title: '新階段' });
  ['action','touch','pain'].forEach(k => data.rows[k].cells.push(''));
  data.owners.cells.push([]);
  render();
  setTimeout(() => {
    const inp = document.querySelector(`#sa${id} .stage-title-inp`);
    if (inp) { inp.focus(); inp.select(); }
  }, 30);
}
function rmStage(id) {
  if (data.stages.length <= 1) { showToast('至少保留一個階段'); return; }
  const idx = data.stages.findIndex(s => s.id === id);
  data.stages.splice(idx, 1);
  ['action','touch','pain'].forEach(k => data.rows[k].cells.splice(idx, 1));
  data.owners.cells.splice(idx, 1);
  render();
}

// Owner chips
function syncOwner(idx, el) {
  const wrap = el.closest('.owner-cell');
  data.owners.cells[idx] = Array.from(wrap.querySelectorAll('.chip-txt')).map(c => c.innerText.trim()).filter(Boolean);
}
function rmOwnerChip(idx, btn) {
  const chip = btn.closest('.owner-chip'), wrap = chip.closest('.owner-cell');
  chip.remove();
  data.owners.cells[idx] = Array.from(wrap.querySelectorAll('.chip-txt')).map(c => c.innerText.trim()).filter(Boolean);
}
function addOwnerChip(idx) {
  const wrap = document.getElementById(`ow${idx}`);
  const sp = document.createElement('span');
  sp.className = 'owner-chip';
  sp.innerHTML = `<span class="chip-txt" contenteditable="true" spellcheck="false"
    onblur="syncOwner(${idx},this)"
    onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">負責人</span>
    <button class="chip-del" onclick="rmOwnerChip(${idx},this)">✕</button>`;
  const addBtn = wrap.querySelector('.owner-add');
  wrap.insertBefore(sp, addBtn);
  data.owners.cells[idx].push('負責人');
  setTimeout(() => {
    const t = sp.querySelector('.chip-txt'); t.focus();
    const r = document.createRange(); r.selectNodeContents(t);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
  }, 20);
}

// Export
function syncDOM() {
  document.querySelectorAll('.stage-title-inp').forEach((inp, i) => {
    if (data.stages[i]) data.stages[i].title = inp.value;
  });
  ['action','touch','pain'].forEach(key => {
    document.querySelectorAll(`.${key}-cell`).forEach((el, i) => {
      data.rows[key].cells[i] = el.innerText.trim();
    });
  });
  document.querySelectorAll('.owner-cell').forEach((el, i) => {
    data.owners.cells[i] = Array.from(el.querySelectorAll('.chip-txt')).map(c => c.innerText.trim()).filter(Boolean);
  });
}
function exportJSON() {
  syncDOM();
  const b = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'journey.json'; a.click();
  showToast('JSON 已匯出');
}
function saveHTML() {
  syncDOM();
  const b = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'customer-journey.html'; a.click();
  showToast('HTML 已儲存');
}
function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
}

render();
</script>
</body>
</html>
